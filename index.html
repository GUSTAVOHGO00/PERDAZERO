<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#00A86B">
  <title>PerdaZero - PRO MultiLojas</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { 
      touch-action: manipulation; 
      -webkit-tap-highlight-color: transparent; 
      -webkit-font-smoothing: antialiased;
    }
    .bg-brand { background-color: #00A86B; }
    .text-brand { color: #00A86B; }
    .border-brand { border-color: #00A86B; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .chart-container { position: relative; width: 100%; height: 200px; }
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .pb-safe-nav { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
    .pt-safe-nav { padding-top: env(safe-area-inset-top); }
  </style>
</head>
<body class="bg-gray-200 w-screen overflow-hidden flex justify-center" style="height: 100vh; height: 100dvh;">

  <div id="root" class="w-full h-full max-w-md bg-white shadow-2xl overflow-hidden flex flex-col relative"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ⚠️ CHAVES DO SUPABASE
    // ==========================================
    const SUPABASE_URL = 'https://svibstwhmygwczobybse.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2aWJzdHdobXlnd2N6b2J5YnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDAyNzAsImV4cCI6MjA5MTE3NjI3MH0.nlOAfAfsz7BHs3LkBIBG5xNxVv2i7-BCGgj7uPR7dSg';

    let supabase;
    try { 
        if(SUPABASE_URL.includes('http')) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 
        }
    } 
    catch (e) { console.error("Erro Supabase:", e); }

    function App() {
      // --- CONFIGURAÇÕES DA REDE (Salvas no LocalStorage) ---
      const [lojaNome, setLojaNome] = useState(() => localStorage.getItem('lojaNome') || "Roy's Store");
      const [lojaLogo, setLojaLogo] = useState(() => localStorage.getItem('lojaLogo') || null); 
      
      // --- ESTADOS GLOBAIS ---
      const [user, setUser] = useState(null); 
      const [view, setView] = useState('select_loja'); 
      const [flowStep, setFlowStep] = useState(0); 
      const [filtroTempo, setFiltroTempo] = useState('hoje'); 
      
      // --- BANCO DE DADOS ---
      const [lojas, setLojas] = useState([]);
      const [equipe, setEquipe] = useState([]);
      const [produtosLista, setProdutosLista] = useState([]);
      const [historico, setHistorico] = useState([]);

      // ==========================================
      // MOTOR DE LEITURA (Supabase)
      // ==========================================
      useEffect(() => {
        async function fetchDados() {
            if (!supabase) return;
            try {
                const { data: dbLojas, error: errLojas } = await supabase.from('lojas').select('*').order('id', { ascending: true });
                if (errLojas) console.error("Erro Lojas:", errLojas);
                else if (dbLojas) setLojas(dbLojas);

                const { data: dbEquipe, error: errEquipe } = await supabase.from('equipe').select('*').order('id', { ascending: true });
                if (errEquipe) console.error("Erro Equipe:", errEquipe);
                else if (dbEquipe) setEquipe(dbEquipe);

                const { data: dbProd, error: errProd } = await supabase.from('produtos').select('*').order('id', { ascending: true });
                if (errProd) console.error("Erro Prod:", errProd);
                else if (dbProd) setProdutosLista(dbProd);

                const { data: dbHist, error: errHist } = await supabase.from('historico').select('*').order('timestamp', { ascending: false });
                if (errHist) console.error("Erro Histórico:", errHist);
                else if (dbHist) setHistorico(dbHist);
            } catch (err) {
                console.error("Erro crítico ao puxar dados:", err);
            }
        }
        fetchDados();
      }, []);

      // --- ESTADOS DO KIOSK E DASHBOARD ---
      const [currentLoja, setCurrentLoja] = useState(null);
      const [pinAttempt, setPinAttempt] = useState('');
      const [userPendingPin, setUserPendingPin] = useState(null);
      const [pinError, setPinError] = useState(false);
      const [dashboardLojaFiltro, setDashboardLojaFiltro] = useState('todas'); 

      // Fluxo Operacional
      const [registro, setRegistro] = useState({ foto_arquivo: null, foto_url_local: null, produto: null, qtd: '', unidade: 'un', motivo: null, responsavel: null, observacao: '', custo_unitario: 0, icone: '📦' });
      const [customProductName, setCustomProductName] = useState('');
      const [customProductEmoji, setCustomProductEmoji] = useState('📦');
      const [isCustomMotivo, setIsCustomMotivo] = useState(false);
      const [customMotivoName, setCustomMotivoName] = useState('');
      const [showColegasList, setShowColegasList] = useState(false);
      const [selectedColega, setSelectedColega] = useState(null);
      const [observacaoColega, setObservacaoColega] = useState('');
      const [isUploading, setIsUploading] = useState(false);
      const [fotoModal, setFotoModal] = useState(null);

      // Gestão Produtos
      const [novoProdNome, setNovoProdNome] = useState('');
      const [novoProdEmoji, setNovoProdEmoji] = useState('📦');
      const [novoProdCusto, setNovoProdCusto] = useState('');
      const [editingProductId, setEditingProductId] = useState(null);
      const [editProdNome, setEditProdNome] = useState('');
      const [editProdEmoji, setEditProdEmoji] = useState('');
      const [editProdCusto, setEditProdCusto] = useState('');

      // Gestão Equipe
      const [novoMembroNome, setNovoMembroNome] = useState('');
      const [novoMembroAvatar, setNovoMembroAvatar] = useState('👨‍🍳');
      const [novoMembroCodigo, setNovoMembroCodigo] = useState('');
      const [novoMembroFuncao, setNovoMembroFuncao] = useState('operacional');
      const [novoMembroLoja, setNovoMembroLoja] = useState('');
      const [editingMembroId, setEditingMembroId] = useState(null);
      const [editMembroNome, setEditMembroNome] = useState('');
      const [editMembroAvatar, setEditMembroAvatar] = useState('👨‍🍳');
      const [editMembroCodigo, setEditMembroCodigo] = useState('');
      const [editMembroFuncao, setEditMembroFuncao] = useState('operacional');

      // Gestão Lojas
      const [novaLojaNome, setNovaLojaNome] = useState('');
      const [editingLojaId, setEditingLojaId] = useState(null);
      const [editLojaNome, setEditLojaNome] = useState('');

      // Dicionário e Listas
      const emojiDict = {
          'carne': '🥩', 'blend': '🥩', 'picanha': '🥩', 'bacon': '🥓', 'file': '🥩',
          'pao': '🍞', 'pão': '🍞', 'hamburguer': '🍔', 'burger': '🍔',
          'batata': '🍟', 'frita': '🍟', 'cebola': '🧅', 'onion': '🧅', 'alho': '🧄',
          'alface': '🥬', 'salada': '🥗', 'tomate': '🍅', 'cenoura': '🥕', 'pepino': '🥒',
          'queijo': '🧀', 'cheddar': '🧀', 'mussarela': '🧀', 'gorgonzola': '🧀',
          'frango': '🍗', 'coxinha': '🍗', 'peixe': '🐟', 'camarao': '🍤', 'camarão': '🍤',
          'ovo': '🥚', 'leite': '🥛', 'sorvete': '🍦', 'refri': '🥤', 'coca': '🥤', 'suco': '🧃', 'refrigerante': '🥤', 'lata': '🥫'
      };

      const motivosLista = [
        { id: 1, nome: 'Validade Expirada', icone: '📅', cor: 'bg-orange-100 text-orange-600' },
        { id: 2, nome: 'Estragado / Mofado', icone: '🦠', cor: 'bg-purple-100 text-purple-600' },
        { id: 3, nome: 'Erro de Preparo', icone: '🔥', cor: 'bg-red-100 text-red-600' },
        { id: 4, nome: 'Devolvido (Cliente)', icone: '😞', cor: 'bg-blue-100 text-blue-600' },
        { id: 5, nome: 'Queda no Chão', icone: '👇', cor: 'bg-yellow-100 text-yellow-600' },
        { id: 6, nome: 'Outro', icone: '➕', cor: 'bg-gray-100 text-gray-600' }
      ];

      // Referências Gráficos
      const chartBarRef = useRef(null);
      const chartDoughnutRef = useRef(null);
      const chartBarInstance = useRef(null);
      const chartDoughnutInstance = useRef(null);

      // Ícones
      const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="m9 12 2 2 4-4"></path></svg>;
      const IconDelete = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>;
      const IconLogout = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
      const IconCameraLg = () => <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>;
      const IconCameraSm = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>;
      const IconBack = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>;
      const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>;
      const IconBox = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path><path d="m3.3 7 8.7 5 8.7-5"></path><path d="M12 22V12"></path></svg>;
      const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
      const IconStore = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m2 7 4.41-2.205a2 2 0 0 1 2 0L12 7l3.59-1.795a2 2 0 0 1 2 0L22 7v14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7Z"></path><path d="M12 22V7"></path><path d="M2 13h20"></path><path d="M2 17h20"></path></svg>;
      const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
      const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
      const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;

      const formatarMoeda = (valor) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);

      const getDadosFiltrados = () => {
          const agoraTs = Date.now();
          return historico.filter(item => {
              const isGlobal = dashboardLojaFiltro === 'todas';
              if (!isGlobal && item.loja_id !== parseInt(dashboardLojaFiltro)) return false;

              const diffDias = (agoraTs - item.timestamp) / (1000 * 60 * 60 * 24);
              if (filtroTempo === 'hoje') return diffDias <= 1;
              if (filtroTempo === 'semana') return diffDias <= 7;
              if (filtroTempo === 'mes') return diffDias <= 30;
              return true;
          });
      };

      const dadosDashboard = getDadosFiltrados();

      // Gráficos
      useEffect(() => {
        if (view === 'dashboard') {
            if (chartBarRef.current) {
                if (chartBarInstance.current) chartBarInstance.current.destroy(); 
                const ctxBar = chartBarRef.current.getContext('2d');
                const perdasPorProduto = {};
                dadosDashboard.forEach(item => {
                    const qtdNum = parseFloat(item.qtd.toString().replace(',', '.')) || 0;
                    perdasPorProduto[item.prod] = (perdasPorProduto[item.prod] || 0) + qtdNum;
                });
                chartBarInstance.current = new Chart(ctxBar, {
                    type: 'bar',
                    data: { labels: Object.keys(perdasPorProduto).length ? Object.keys(perdasPorProduto) : ['Sem dados'], datasets: [{ label: 'Volume Perdido', data: Object.values(perdasPorProduto).length ? Object.values(perdasPorProduto) : [0], backgroundColor: '#00A86B', borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                });
            }

            if (chartDoughnutRef.current) {
                if (chartDoughnutInstance.current) chartDoughnutInstance.current.destroy();
                const ctxDoughnut = chartDoughnutRef.current.getContext('2d');
                const custoPorMotivo = {};
                dadosDashboard.forEach(item => {
                    custoPorMotivo[item.motivo] = (custoPorMotivo[item.motivo] || 0) + (item.custo_total || 0);
                });
                const coresFixas = ['#f97316', '#ef4444', '#eab308', '#3b82f6', '#a855f7', '#64748b'];
                chartDoughnutInstance.current = new Chart(ctxDoughnut, {
                    type: 'doughnut',
                    data: { labels: Object.keys(custoPorMotivo).length ? Object.keys(custoPorMotivo) : ['Sem dados'], datasets: [{ data: Object.values(custoPorMotivo).length ? Object.values(custoPorMotivo) : [1], backgroundColor: coresFixas, borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
                });
            }
        }
      }, [view, dadosDashboard]);

      // Navegação
      const handleSelectUser = (selectedUser) => {
          if (selectedUser.funcao === 'operacional') {
              setUser(selectedUser);
              setView('home_func');
          } else {
              setUserPendingPin(selectedUser);
              setPinAttempt('');
              setPinError(false);
              setView('pin_modal');
          }
      };

      const handlePinSubmit = () => {
          if (pinAttempt === userPendingPin.codigo) {
              setUser(userPendingPin);
              setView('dashboard');
              setDashboardLojaFiltro(userPendingPin.loja_id ? userPendingPin.loja_id.toString() : 'todas');
          } else {
              setPinError(true);
              setPinAttempt('');
          }
      };

      const resetFlowState = () => {
          setRegistro({ foto_arquivo: null, foto_url_local: null, produto: null, qtd: '', unidade: 'un', motivo: null, responsavel: null, observacao: '', custo_unitario: 0, icone: '📦' });
          setCustomProductName(''); setCustomProductEmoji('📦');
          setIsCustomMotivo(false); setCustomMotivoName('');
          setShowColegasList(false); setSelectedColega(null); setObservacaoColega('');
          setFlowStep(1);
      };

      const buscarEmoji = (textoDigitado) => {
          const lowerVal = textoDigitado.toLowerCase().trim();
          let foundEmoji = '📦';
          for (const [key, emoji] of Object.entries(emojiDict)) {
              if (lowerVal.includes(key)) { foundEmoji = emoji; break; }
          }
          return foundEmoji;
      };

      const PhotoModal = () => {
          if (!fotoModal) return null;
          return (
              <div className="absolute inset-0 bg-slate-900/95 z-50 flex flex-col items-center justify-center p-4 animate-fade-in backdrop-blur-sm">
                  <button onClick={() => setFotoModal(null)} className="absolute top-6 right-6 text-white bg-white/10 p-4 rounded-full hover:bg-red-500 transition-colors"><IconDelete/></button>
                  <div className="bg-white p-2 rounded-2xl shadow-2xl w-full max-w-sm">
                      <img src={fotoModal} className="w-full h-auto max-h-[60vh] object-cover rounded-xl" alt="Evidência" />
                  </div>
                  <p className="text-white mt-6 bg-brand px-6 py-2 rounded-full font-bold tracking-widest text-sm shadow-lg border border-green-400">AUDITORIA VISUAL</p>
              </div>
          )
      };

      const RenderLogo = ({ className, size = 24 }) => {
          if (lojaLogo) return <img src={lojaLogo} className={`object-contain rounded-full shadow-inner bg-white ${className}`} alt="Logo" style={{width: size, height: size}} />;
          return <div className={`flex items-center justify-center ${className}`} style={{width: size, height: size}}><IconShield/></div>;
      };

      const BottomNav = () => (
          <div className="bg-white border-t border-gray-200 p-2 pb-safe-nav px-2 flex justify-between items-center absolute bottom-0 w-full z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
              <button onClick={() => setView('dashboard')} className={`flex flex-col items-center p-2 flex-1 ${view === 'dashboard' ? 'text-brand' : 'text-slate-400'}`}><IconDashboard/><span className="text-[9px] font-bold uppercase mt-1">Painel</span></button>
              <button onClick={() => setView('manager_produtos')} className={`flex flex-col items-center p-2 flex-1 ${view === 'manager_produtos' ? 'text-brand' : 'text-slate-400'}`}><IconBox/><span className="text-[9px] font-bold uppercase mt-1">Produtos</span></button>
              {user?.funcao === 'admin' && <button onClick={() => setView('manager_lojas')} className={`flex flex-col items-center p-2 flex-1 ${view === 'manager_lojas' ? 'text-brand' : 'text-slate-400'}`}><IconStore/><span className="text-[9px] font-bold uppercase mt-1">Unidades</span></button>}
              <button onClick={() => setView('manager_equipe')} className={`flex flex-col items-center p-2 flex-1 ${view === 'manager_equipe' ? 'text-brand' : 'text-slate-400'}`}><IconUsers/><span className="text-[9px] font-bold uppercase mt-1">Equipe</span></button>
              {user?.funcao === 'admin' && <button onClick={() => setView('manager_settings')} className={`flex flex-col items-center p-2 flex-1 ${view === 'manager_settings' ? 'text-brand' : 'text-slate-400'}`}><IconSettings/><span className="text-[9px] font-bold uppercase mt-1">Ajustes</span></button>}
          </div>
      );

      // ==========================================
      // TELA 1: SELECIONAR LOJA
      // ==========================================
      if (view === 'select_loja') {
          return (
              <div className="flex-1 flex flex-col p-6 bg-slate-900 justify-center animate-fade-in pt-safe-nav">
                  <div className="text-center mb-10">
                      <RenderLogo size={80} className="bg-brand text-white mx-auto mb-4" />
                      <h1 className="text-3xl font-extrabold text-white tracking-tight">Perda<span className="text-brand">Zero</span></h1>
                      <p className="text-slate-400 mt-2 text-sm">{lojaNome} - Seleção de Unidade</p>
                  </div>
                  <h2 className="text-white text-xl font-bold mb-4 text-center">Onde você está trabalhando hoje?</h2>
                  <div className="space-y-3 overflow-y-auto max-h-[40vh] hide-scrollbar">
                      {lojas.length === 0 && <p className="text-slate-500 text-center text-sm py-4">Nenhuma loja cadastrada ainda.</p>}
                      {lojas.map(loja => (
                          <button key={loja.id} onClick={() => { setCurrentLoja(loja); setView('select_user'); }} className="w-full bg-slate-800 border border-slate-700 text-white p-5 rounded-2xl font-bold text-lg hover:bg-brand transition-colors active:scale-95 shadow-lg flex justify-between items-center">
                              {loja.nome} <span className="text-2xl">🏪</span>
                          </button>
                      ))}
                  </div>
                  <button onClick={() => { setCurrentLoja({id: null, nome: 'Acesso Administrativo'}); setView('select_user'); }} className="w-full mt-6 bg-transparent border-2 border-dashed border-slate-700 text-slate-400 p-4 rounded-2xl font-bold hover:text-white hover:border-slate-500 transition-colors">
                      Acesso Administrativo
                  </button>
              </div>
          );
      }

      // ==========================================
      // TELA 2: QUEM É VOCÊ?
      // ==========================================
      if (view === 'select_user') {
          const equipeDaLoja = equipe.filter(e => e.loja_id === currentLoja?.id || e.funcao === 'admin');
          return (
              <div className="flex-1 flex flex-col bg-gray-50 animate-slide-up relative">
                  <div className="bg-brand p-6 pt-10 pb-8 rounded-b-[40px] shadow-lg flex flex-col justify-between text-white text-center pt-safe-nav">
                      <p className="text-green-100 text-sm font-bold tracking-widest uppercase mb-1">{currentLoja?.nome || "Painel Geral"}</p>
                      <h2 className="text-3xl font-black">Quem é você?</h2>
                  </div>
                  <div className="flex-1 p-6 overflow-y-auto hide-scrollbar">
                      <p className="text-center text-slate-500 font-medium mb-6">Toque no seu nome para continuar</p>
                      <div className="grid grid-cols-2 gap-4">
                          {equipeDaLoja.length === 0 && <p className="text-slate-400 col-span-2 text-center py-4">Nenhum funcionário nesta loja.</p>}
                          {equipeDaLoja.map(membro => (
                              <button key={membro.id} onClick={() => handleSelectUser(membro)} className="bg-white border border-gray-200 p-6 rounded-3xl flex flex-col items-center shadow-sm hover:border-brand hover:shadow-md active:scale-95 transition-all">
                                  <div className="text-5xl mb-3 bg-gray-50 p-4 rounded-full shadow-inner">{membro.avatar || '👤'}</div>
                                  <span className="font-bold text-slate-800 text-lg text-center leading-tight">{membro.nome.split(' ')[0]}</span>
                                  {membro.funcao !== 'operacional' && <span className="mt-2 text-[9px] bg-slate-800 text-white px-2 py-0.5 rounded-full uppercase flex items-center tracking-wider"><IconLock/> Senha</span>}
                              </button>
                          ))}
                      </div>
                  </div>
                  <button onClick={() => setView('select_loja')} className="p-4 text-slate-400 font-bold text-sm text-center w-full pb-safe-nav">Voltar / Trocar de Loja</button>
              </div>
          );
      }

      // ==========================================
      // MODAL DE PIN (Para Gerentes/Admins)
      // ==========================================
      if (view === 'pin_modal') {
          return (
              <div className="flex-1 flex flex-col p-6 bg-slate-900 justify-center items-center animate-fade-in">
                  <div className="bg-white w-full max-w-sm rounded-[40px] p-8 flex flex-col items-center shadow-2xl relative">
                      <button onClick={() => setView('select_user')} className="absolute top-6 left-6 text-slate-400"><IconBack/></button>
                      <div className="text-6xl mb-4 mt-2">{userPendingPin.avatar || '👤'}</div>
                      <h2 className="text-2xl font-bold text-slate-800 mb-1">Olá, {userPendingPin.nome.split(' ')[0]}</h2>
                      <p className="text-slate-500 text-sm mb-6 font-medium">Digite seu PIN de acesso</p>
                      
                      <div className="flex space-x-3 mb-6">
                        {[0, 1, 2, 3].map((i) => (<div key={i} className={`w-12 h-12 rounded-xl flex items-center justify-center text-3xl font-bold border-2 ${pinAttempt[i] ? 'border-brand text-brand bg-green-50 scale-110' : 'border-gray-200 text-transparent bg-gray-50'} transition-all`}>{pinAttempt[i] || '•'}</div>))}
                      </div>
                      
                      {pinError && <p className="text-red-500 text-xs font-bold mb-4 animate-bounce">PIN Incorreto. Tente novamente.</p>}

                      <div className="grid grid-cols-3 gap-3 w-full">
                          {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (<button key={num} onClick={() => setPinAttempt(pinAttempt + num)} disabled={pinAttempt.length >= 4} className="bg-gray-50 text-slate-800 text-2xl font-bold py-4 rounded-2xl active:bg-gray-200">{num}</button>))}
                          <button className="bg-transparent"></button>
                          <button onClick={() => setPinAttempt(pinAttempt + '0')} disabled={pinAttempt.length >= 4} className="bg-gray-50 text-slate-800 text-2xl font-bold py-4 rounded-2xl active:bg-gray-200">0</button>
                          <button onClick={() => setPinAttempt(pinAttempt.slice(0, -1))} className="bg-red-50 text-red-500 font-bold py-4 rounded-2xl active:bg-red-100 flex items-center justify-center"><IconDelete/></button>
                      </div>
                      
                      <button onClick={handlePinSubmit} disabled={pinAttempt.length !== 4} className={`w-full py-4 mt-6 rounded-2xl font-bold text-white transition-all ${pinAttempt.length === 4 ? 'bg-brand' : 'bg-gray-300'}`}>CONFIRMAR</button>
                  </div>
              </div>
          )
      }

      // ==========================================
      // TELA 3: HOME DO FUNCIONÁRIO (Modo Cozinha)
      // ==========================================
      if (view === 'home_func') {
        return (
          <div className="flex-1 flex flex-col bg-gray-50 animate-slide-up pb-safe-nav pt-safe-nav">
            <div className="bg-brand p-6 pt-10 pb-10 rounded-b-[40px] shadow-lg flex justify-between items-center text-white relative overflow-hidden">
               <div className="absolute top-[-20px] right-[-20px] opacity-20 text-brand pointer-events-none"><RenderLogo size={160} /></div>
               <div className="z-10"><p className="text-green-100 text-sm font-medium">Bom trabalho,</p><h2 className="text-3xl font-bold tracking-tight">{user.nome.split(' ')[0]}</h2></div>
               <button onClick={() => {setUser(null); setView('select_loja');}} className="p-3 bg-white/20 rounded-full z-10 active:bg-white/30 transition-colors"><IconLogout/></button>
            </div>
            <div className="flex-1 flex flex-col items-center justify-center p-6">
                <button onClick={() => { setView('flow'); resetFlowState(); }} className="w-full max-w-xs aspect-square bg-red-50 border-4 border-red-500 rounded-[40px] flex flex-col items-center justify-center text-red-600 active:scale-95 shadow-2xl transition-transform z-10">
                    <div className="bg-red-500 text-white p-6 rounded-full mb-4 shadow-lg"><IconCameraLg/></div>
                    <span className="text-2xl font-extrabold uppercase text-center tracking-wide">Fotografar<br/>Perda</span>
                </button>
            </div>
          </div>
        );
      }

      // ==========================================
      // TELA 4: FLUXO DE REGISTRO (5 PASSOS)
      // ==========================================
      if (view === 'flow') {
        
        const proceedToStep5 = (motivoSelecionado) => {
            if (motivoSelecionado === 'Outro' && customMotivoName.trim() === '') return;
            setRegistro({...registro, motivo: motivoSelecionado === 'Outro' ? customMotivoName : motivoSelecionado});
            setFlowStep(5);
        };

        const finishFlow = async (nomeResponsavel) => {
            setIsUploading(true);
            const qtdNum = parseFloat(registro.qtd.toString().replace(',', '.')) || 0;
            const custoTotal = qtdNum * registro.custo_unitario;
            
            let finalPhotoUrl = null;

            if (registro.foto_arquivo && supabase) {
                const fileExt = registro.foto_arquivo.name.split('.').pop();
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(2, 15)}.${fileExt}`;
                
                const { error: uploadError } = await supabase.storage.from('fotos_perdas').upload(fileName, registro.foto_arquivo);
                
                if (!uploadError) {
                    const { data: publicUrlData } = supabase.storage.from('fotos_perdas').getPublicUrl(fileName);
                    finalPhotoUrl = publicUrlData.publicUrl;
                } else {
                    alert("Erro ao subir a foto: " + uploadError.message);
                }
            }

            const dataAtual = new Date();
            const horaFormatada = dataAtual.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const horaString = `Hoje, ${horaFormatada}`;

            const objSalvar = {
                loja_id: currentLoja.id, relator: user.nome, responsavel: nomeResponsavel,
                prod: registro.produto, qtd: qtdNum, uni: registro.unidade,
                motivo: registro.motivo, observacao: observacaoColega, hora: horaString,
                img: registro.icone, custo_total: custoTotal, foto_url: finalPhotoUrl, timestamp: Date.now()
            };

            if (supabase) {
                const { error } = await supabase.from('historico').insert([objSalvar]);
                if (error) alert("ERRO AO SALVAR REGISTRO: " + error.message);
            }

            const novoReg = { id: Date.now(), ...objSalvar };
            setHistorico([novoReg, ...historico]);
            
            setIsUploading(false);
            alert('✅ Sucesso! Desperdício registrado.');
            resetFlowState();
            setView(user.funcao === 'operacional' ? 'home_func' : 'dashboard');
        };

        if (isUploading) {
            return (
                <div className="flex-1 flex flex-col bg-slate-900 justify-center items-center">
                    <div className="w-16 h-16 border-4 border-brand border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-white font-bold tracking-widest uppercase">Salvando Registro...</p>
                </div>
            )
        }

        return (
          <div className="flex-1 flex flex-col bg-white pb-safe-nav">
            <div className="p-4 border-b flex items-center shadow-sm z-10 pt-safe-nav">
              <button onClick={() => { 
                  if(flowStep === 5 && selectedColega) { setSelectedColega(null); setObservacaoColega(''); return; }
                  if(flowStep === 5 && showColegasList) { setShowColegasList(false); return; }
                  if(flowStep === 4 && isCustomMotivo) { setIsCustomMotivo(false); setCustomMotivoName(''); return; }
                  if(flowStep > 1) setFlowStep(flowStep - 1); else setView(user.funcao === 'operacional' ? 'home_func' : 'dashboard'); 
              }} className="p-2 text-slate-500"><IconBack/></button>
              <div className="flex-1 text-center font-bold text-slate-400 text-sm tracking-widest">PASSO {flowStep} DE 5</div><div className="w-10"></div>
            </div>

            {flowStep === 1 && (
              <div className="flex-1 flex flex-col items-center justify-center p-6 animate-slide-up text-center">
                <h3 className="text-2xl font-bold text-slate-800 mb-8">Tire uma foto do item</h3>
                
                {registro.foto_url_local ? (
                    <div className="w-full max-w-xs relative mb-8 rounded-2xl overflow-hidden shadow-lg border-4 border-brand">
                        <img src={registro.foto_url_local} className="w-full h-48 object-cover" />
                        <div className="absolute bottom-2 right-2 bg-brand text-white text-xs font-bold px-2 py-1 rounded">Câmera Ativa</div>
                    </div>
                ) : (
                    <div className="w-full max-w-xs h-48 bg-gray-100 rounded-2xl mb-8 flex items-center justify-center border-2 border-dashed border-gray-300 text-gray-400">
                        <IconCameraLg />
                    </div>
                )}

                <label className="w-full py-5 bg-brand text-white font-bold rounded-2xl text-xl flex items-center justify-center shadow-xl active:scale-95 cursor-pointer transition-transform">
                  <IconCameraSm/> <span className="ml-2">{registro.foto_url_local ? 'Tirar Outra Foto' : 'Abrir Câmera'}</span>
                  <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => { 
                      if(e.target.files && e.target.files[0]) {
                          const file = e.target.files[0];
                          const urlLocal = URL.createObjectURL(file);
                          setRegistro({...registro, foto_arquivo: file, foto_url_local: urlLocal}); 
                      }
                  }}/>
                </label>

                {registro.foto_url_local && (
                     <button onClick={() => setFlowStep(2)} className="mt-4 w-full py-5 bg-slate-900 text-white font-bold rounded-2xl text-xl shadow-xl active:scale-95 transition-transform animate-fade-in">Avançar com esta foto</button>
                )}

                <button onClick={() => setFlowStep(2)} className="mt-8 text-slate-400 underline p-2 font-medium">Pular (Sem Foto)</button>
              </div>
            )}

            {flowStep === 2 && (
              <div className="flex-1 flex flex-col p-6 animate-slide-up bg-gray-50">
                <h3 className="text-xl font-bold text-slate-800 mb-4">O que está na foto?</h3>
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 mb-6 flex gap-3 items-center">
                    <div className="text-4xl w-16 h-16 bg-gray-50 rounded-xl border border-gray-100 flex items-center justify-center shadow-inner">{customProductEmoji}</div>
                    <div className="flex-1">
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Buscar ou Digitar Produto</label>
                        <input autoFocus placeholder="Ex: Camarão" value={customProductName} onChange={(e) => {setCustomProductName(e.target.value); setCustomProductEmoji(buscarEmoji(e.target.value));}} className="w-full text-lg font-bold text-slate-800 focus:outline-none placeholder:font-normal"/>
                    </div>
                </div>
                <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Ou escolha da lista:</div>
                <div className="grid grid-cols-2 gap-3 overflow-y-auto pb-6 hide-scrollbar flex-1">
                  {produtosLista.map(p => (
                    <button key={p.id} onClick={() => { setCustomProductName(p.nome); setCustomProductEmoji(p.icone); setRegistro({...registro, produto: p.nome, custo_unitario: p.custo || 0, icone: p.icone}); setFlowStep(3); }} className="bg-white border border-gray-200 p-4 rounded-2xl flex items-center shadow-sm active:border-brand active:bg-green-50 transition-colors">
                        <span className="text-3xl mr-3">{p.icone}</span><span className="font-bold text-slate-700 text-sm text-left leading-tight">{p.nome}</span>
                    </button>
                  ))}
                </div>
                {customProductName && (
                    <button onClick={() => { setRegistro({...registro, produto: customProductName, custo_unitario: 0, icone: customProductEmoji}); setFlowStep(3); }} className="w-full py-4 rounded-2xl font-bold text-white text-lg transition-all bg-brand shadow-lg mt-4 animate-fade-in">Confirmar: {customProductName}</button>
                )}
              </div>
            )}

            {flowStep === 3 && (
              <div className="flex-1 flex flex-col p-6 items-center animate-slide-up bg-gray-50">
                <h3 className="text-lg font-bold text-slate-800 mb-1">Quantidade de</h3><p className="text-brand font-extrabold text-xl mb-6 text-center">{registro.icone} {registro.produto}</p>
                <div className="flex bg-gray-200 p-1.5 rounded-2xl mb-8 w-full max-w-xs">
                  <button onClick={()=>setRegistro({...registro, unidade: 'un'})} className={`flex-1 py-2 font-bold rounded-xl transition-all ${registro.unidade === 'un' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Unid.</button>
                  <button onClick={()=>setRegistro({...registro, unidade: 'kg'})} className={`flex-1 py-2 font-bold rounded-xl transition-all ${registro.unidade === 'kg' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Kg</button>
                  <button onClick={()=>setRegistro({...registro, unidade: 'L'})}  className={`flex-1 py-2 font-bold rounded-xl transition-all ${registro.unidade === 'L' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Litro</button>
                </div>
                <div className="text-6xl font-black text-slate-800 mb-8 h-16 flex items-baseline">{registro.qtd || '0'} <span className="text-2xl text-slate-400 ml-2 font-bold">{registro.unidade}</span></div>
                <div className="grid grid-cols-3 gap-3 w-full max-w-xs mb-4">
                  {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => setRegistro({...registro, qtd: registro.qtd + n})} className="bg-white border border-gray-200 text-3xl font-bold py-4 rounded-2xl active:bg-gray-100 shadow-sm">{n}</button>)}
                  <button onClick={() => { if (!registro.qtd.includes(',')) setRegistro({...registro, qtd: registro.qtd + ','}); }} className="bg-white border border-gray-200 text-3xl font-bold py-4 rounded-2xl active:bg-gray-100 shadow-sm">,</button>
                  <button onClick={() => setRegistro({...registro, qtd: registro.qtd + '0'})} className="bg-white border border-gray-200 text-3xl font-bold py-4 rounded-2xl active:bg-gray-100 shadow-sm">0</button>
                  <button onClick={() => setRegistro({...registro, qtd: registro.qtd.slice(0,-1)})} className="bg-red-50 border border-red-100 text-red-500 py-4 rounded-2xl flex justify-center items-center shadow-sm active:bg-red-100"><IconDelete/></button>
                </div>
                <button onClick={()=>setFlowStep(4)} disabled={!registro.qtd} className={`mt-auto w-full max-w-xs py-4 rounded-2xl font-bold text-white text-lg transition-all ${registro.qtd ? 'bg-brand shadow-lg' : 'bg-gray-300'}`}>AVANÇAR</button>
              </div>
            )}

            {flowStep === 4 && !isCustomMotivo && (
              <div className="flex-1 flex flex-col p-4 animate-slide-up bg-gray-50">
                <h3 className="text-xl font-bold text-slate-800 mb-1 px-2">Por que foi perdido?</h3>
                <p className="text-slate-500 text-sm mb-6 px-2">Selecione o motivo.</p>
                <div className="grid grid-cols-2 gap-3 pb-6 px-2">
                  {motivosLista.map(m => (
                    <button key={m.id} onClick={() => { m.nome === 'Outro' ? setIsCustomMotivo(true) : proceedToStep5(m.nome); }} className="bg-white border border-gray-200 p-5 rounded-3xl flex flex-col items-center shadow-sm active:scale-95 transition-transform"><div className={`w-14 h-14 rounded-full flex items-center justify-center text-3xl mb-3 shadow-inner ${m.cor}`}>{m.icone}</div><span className="font-bold text-slate-700 text-sm text-center">{m.nome}</span></button>
                  ))}
                </div>
              </div>
            )}

            {flowStep === 4 && isCustomMotivo && (
              <div className="flex-1 flex flex-col p-6 animate-slide-up bg-gray-50">
                <h3 className="text-xl font-bold text-slate-800 mb-2">Descrever Motivo</h3>
                <textarea autoFocus placeholder="Ex: A geladeira desligou..." value={customMotivoName} onChange={(e) => setCustomMotivoName(e.target.value)} className="w-full p-4 border border-gray-200 rounded-2xl text-base font-medium text-slate-800 focus:border-brand focus:outline-none mb-8 resize-none h-32"></textarea>
                <button onClick={() => proceedToStep5('Outro')} disabled={customMotivoName.trim() === ''} className={`w-full py-4 rounded-2xl font-bold text-white text-lg transition-all ${customMotivoName.trim() !== '' ? 'bg-brand shadow-lg' : 'bg-gray-300'}`}>Avançar</button>
              </div>
            )}

            {/* PASSO 5 - RESPONSABILIDADE */}
            {flowStep === 5 && !showColegasList && (
              <div className="flex-1 flex flex-col p-6 animate-slide-up bg-gray-50 items-center justify-center text-center">
                <h3 className="text-3xl font-black text-slate-800 mb-2">Você sabe quem foi?</h3>
                <p className="text-slate-500 font-medium mb-8">Fique tranquilo(a)! Se você apontar um colega, essa informação é confidencial e só a gerência verá.</p>
                
                <div className="w-full max-w-xs space-y-4">
                    <button onClick={() => finishFlow(user.nome)} className="w-full py-5 bg-white border border-gray-200 rounded-2xl font-bold text-slate-700 text-lg shadow-sm active:bg-gray-100 flex items-center justify-center">
                        🙋‍♂️ Fui eu mesmo
                    </button>
                    <button onClick={() => finishFlow('Não identificado')} className="w-full py-5 bg-white border border-gray-200 rounded-2xl font-bold text-slate-700 text-lg shadow-sm active:bg-gray-100 flex items-center justify-center">
                        🤷‍♂️ Não sei / Achei assim
                    </button>
                    <button onClick={() => setShowColegasList(true)} className="w-full py-5 bg-white border border-gray-200 rounded-2xl font-bold text-brand text-lg shadow-sm active:bg-gray-100 flex items-center justify-center">
                        Foi outra pessoa...
                    </button>
                </div>
              </div>
            )}

            {flowStep === 5 && showColegasList && !selectedColega && (
              <div className="flex-1 flex flex-col p-6 animate-slide-up bg-gray-50">
                <h3 className="text-xl font-bold text-slate-800 mb-2">Selecione o Colega:</h3>
                <p className="text-slate-500 text-sm mb-6">Esta informação é confidencial.</p>

                <div className="grid grid-cols-2 gap-4 overflow-y-auto pb-6 hide-scrollbar flex-1">
                  {equipe.filter(e => e.loja_id === currentLoja.id).map(c => (
                    <button key={c.id} onClick={() => setSelectedColega(c.nome)} className="bg-white border border-gray-200 p-4 rounded-2xl flex flex-col items-center shadow-sm active:border-brand active:bg-green-50 transition-colors">
                        <span className="text-4xl mb-2">{c.avatar || '👤'}</span>
                        <span className="font-bold text-slate-700 text-sm text-center">{c.nome.split(' ')[0]}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {flowStep === 5 && selectedColega && (
              <div className="flex-1 flex flex-col p-6 animate-slide-up bg-gray-50">
                <h3 className="text-xl font-bold text-slate-800 mb-2">Responsável: {selectedColega.split(' ')[0]}</h3>
                <p className="text-slate-500 text-sm mb-6">Quer adicionar alguma observação? (Opcional)</p>
                
                <textarea autoFocus placeholder="Ex: Deixou a porta do freezer aberta..." value={observacaoColega} onChange={(e) => setObservacaoColega(e.target.value)} className="w-full p-4 border border-gray-200 rounded-2xl text-base font-medium text-slate-800 focus:border-brand focus:outline-none mb-8 resize-none h-32"></textarea>

              </div>
            )}
          </div>
        );
      }

      // ==========================================
      // TELA GERENTE: DASHBOARD COMPLETO
      // ==========================================
      if (view === 'dashboard') {
        const totalPrejuizo = dadosDashboard.reduce((acc, curr) => acc + (curr.custo_total || 0), 0);

        const rankingCulpados = {};
        dadosDashboard.forEach(item => {
            if (item.responsavel !== 'Não identificado') {
                rankingCulpados[item.responsavel] = (rankingCulpados[item.responsavel] || 0) + (item.custo_total || 0);
            }
        });
        const topFuncionarios = Object.entries(rankingCulpados).sort((a,b)=>b[1]-a[1]).slice(0,3);

        const rankingProd = {};
        dadosDashboard.forEach(item => rankingProd[item.prod] = (rankingProd[item.prod] || 0) + (item.custo_total || 0));
        const topProdutos = Object.entries(rankingProd).sort((a,b)=>b[1]-a[1]).slice(0,3);

        return (
          <div className="flex-1 flex flex-col bg-gray-100 animate-slide-up h-full pb-safe-nav relative pt-safe-nav">

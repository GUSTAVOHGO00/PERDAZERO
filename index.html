<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PerdaZero - PRO MultiLojas</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Bloqueia o balanço do iPhone e garante altura real */
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
    body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    
    .bg-brand { background-color: #00A86B; }
    .text-brand { color: #00A86B; }
    .border-brand { border-color: #00A86B; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Área de rolagem interna */
    .main-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 100px;
    }

    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="flex justify-center items-center">

  <div id="root" class="w-full h-[100svh] max-w-md bg-white shadow-2xl overflow-hidden flex flex-col relative"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- CONEXÃO SUPABASE ---
    const SUPABASE_URL = 'https://svibstwhmygwczobybse.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2aWJzdHdobXlnd2N6b2J5YnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDAyNzAsImV4cCI6MjA5MTE3NjI3MH0.nlOAfAfsz7BHs3LkBIBG5xNxVv2i7-BCGgj7uPR7dSg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function App() {
      // --- CONFIGURAÇÕES DA REDE ---
      const [lojaNome, setLojaNome] = useState("Roy's Store");
      const [lojaLogo, setLojaLogo] = useState(null); 
      
      // --- ESTADOS GLOBAIS ---
      const [user, setUser] = useState(null); 
      const [view, setView] = useState('select_loja'); 
      const [loading, setLoading] = useState(true);
      const [filtroTempo, setFiltroTempo] = useState('hoje'); 
      
      const [lojas, setLojas] = useState([]);
      const [equipe, setEquipe] = useState([]);
      const [produtosLista, setProdutosLista] = useState([]);
      const [historico, setHistorico] = useState([]);

      const [currentLoja, setCurrentLoja] = useState(null);
      const [pinAttempt, setPinAttempt] = useState('');
      const [userPendingPin, setUserPendingPin] = useState(null);
      const [pinError, setPinError] = useState(false);
      const [dashboardLojaFiltro, setDashboardLojaFiltro] = useState('todas'); 

      const [flowStep, setFlowStep] = useState(1);
      const [isSaving, setIsSaving] = useState(false);
      const [registro, setRegistro] = useState({ foto_arquivo: null, foto_url_local: null, produto: null, qtd: '', unidade: 'un', motivo: null, responsavel: null, observacao: '', custo_unitario: 0, icone: '📦' });
      const [customProductName, setCustomProductName] = useState('');
      const [showColegasList, setShowColegasList] = useState(false);
      const [observacaoColega, setObservacaoColega] = useState('');
      const [fotoModal, setFotoModal] = useState(null);

      const emojiDict = { 'carne': '🥩', 'pao': '🍞', 'batata': '🍟', 'refri': '🥤', 'ovo': '🥚', 'salada': '🥗' };
      const motivosLista = [
        { id: 1, nome: 'Validade Expirada', icone: '📅', cor: 'bg-orange-100 text-orange-600' },
        { id: 2, nome: 'Estragado / Mofado', icone: '🦠', cor: 'bg-purple-100 text-purple-600' },
        { id: 3, nome: 'Erro de Preparo', icone: '🔥', cor: 'bg-red-100 text-red-600' },
        { id: 4, nome: 'Devolvido (Cliente)', icone: '😞', cor: 'bg-blue-100 text-blue-600' },
        { id: 5, nome: 'Queda no Chão', icone: '👇', cor: 'bg-yellow-100 text-yellow-600' },
        { id: 6, nome: 'Outro', icone: '➕', cor: 'bg-gray-100 text-gray-600' }
      ];

      const chartBarRef = useRef(null);
      const chartBarInstance = useRef(null);

      useEffect(() => { fetchDados(); }, []);

      async function fetchDados() {
          const { data: dl } = await supabase.from('lojas').select('*').order('nome');
          const { data: de } = await supabase.from('equipe').select('*').order('nome');
          const { data: dp } = await supabase.from('produtos').select('*').order('nome');
          const { data: dh } = await supabase.from('historico').select('*').order('timestamp', { ascending: false });
          if(dl) setLojas(dl); if(de) setEquipe(de); if(dp) setProdutosLista(dp); if(dh) setHistorico(dh);
          setLoading(false);
      }

      const buscarEmoji = (t) => {
          const low = t.toLowerCase();
          for (const [k, e] of Object.entries(emojiDict)) { if(low.includes(k)) return e; }
          return '📦';
      };

      const RenderLogo = ({ size = 40 }) => (
          <div style={{width: size, height: size}} className="bg-white rounded-full flex items-center justify-center overflow-hidden shadow-inner border border-gray-100 shrink-0">
              {lojaLogo ? <img src={lojaLogo} className="w-full h-full object-cover" /> : <span className="text-brand font-black text-xl">R</span>}
          </div>
      );

      const BottomNav = () => (
          <div className="bg-white border-t p-2 pb-8 flex justify-around items-center absolute bottom-0 w-full z-20 shadow-lg">
              <button onClick={() => setView('dashboard')} className={`flex flex-col items-center flex-1 ${view==='dashboard'?'text-brand':'text-slate-300'}`}>📊<span className="text-[10px] font-black mt-1">PAINEL</span></button>
              <button onClick={() => setView('manager_produtos')} className={`flex flex-col items-center flex-1 ${view==='manager_produtos'?'text-brand':'text-slate-300'}`}>📦<span className="text-[10px] font-black mt-1">PRODUTOS</span></button>
              <button onClick={() => setView('manager_lojas')} className={`flex flex-col items-center flex-1 ${view==='manager_lojas'?'text-brand':'text-slate-300'}`}>🏪<span className="text-[10px] font-black mt-1">UNIDADES</span></button>
              <button onClick={() => setView('manager_equipe')} className={`flex flex-col items-center flex-1 ${view==='manager_equipe'?'text-brand':'text-slate-300'}`}>👥<span className="text-[10px] font-black mt-1">EQUIPE</span></button>
              <button onClick={() => setView('manager_settings')} className={`flex flex-col items-center flex-1 ${view==='manager_settings'?'text-brand':'text-slate-300'}`}>⚙️<span className="text-[10px] font-black mt-1">AJUSTES</span></button>
          </div>
      );

      const handleSelectUser = (u) => {
          if (u.funcao === 'operacional') { setUser(u); setView('home_func'); }
          else { setUserPendingPin(u); setPinAttempt(''); setPinError(false); setView('pin_modal'); }
      };

      const handlePinSubmit = () => {
          if (pinAttempt === userPendingPin.codigo) { 
              setUser(userPendingPin); 
              setView(userPendingPin.funcao === 'admin' ? 'dashboard' : 'home_func');
          } else { setPinError(true); setPinAttempt(''); }
      };

      const formatarMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

      if (loading) return <div className="flex-1 flex items-center justify-center bg-slate-900 text-white font-black text-xl">CARREGANDO ROY'S...</div>;

      // ==========================================
      // TELA: SELEÇÃO DE LOJA
      // ==========================================
      if (view === 'select_loja') {
          return (
              <div className="flex-1 flex flex-col p-6 bg-slate-900 justify-center animate-fade-in">
                  <div className="flex flex-col items-center mb-10">
                      <RenderLogo size={90} />
                      <h1 className="text-4xl font-black text-white mt-4 tracking-tighter text-center">Perda<span className="text-brand">Zero</span></h1>
                      <p className="text-slate-400 font-bold uppercase text-[10px] mt-1 tracking-widest">{lojaNome}</p>
                  </div>
                  <div className="space-y-4">
                      {lojas.map(l => (
                          <button key={l.id} onClick={() => { setCurrentLoja(l); setView('select_user'); }} className="w-full bg-slate-800 border-2 border-slate-700 text-white p-6 rounded-[35px] font-black text-xl flex justify-between items-center active:scale-95 transition-transform">
                              {l.nome} 🏪
                          </button>
                      ))}
                      <button onClick={() => { 
                          const admin = equipe.find(e => e.funcao === 'admin');
                          if(admin) handleSelectUser(admin); else alert('Cadastre o Admin na Equipe primeiro!');
                      }} className="w-full mt-10 border-2 border-dashed border-slate-600 text-slate-500 p-5 rounded-[35px] font-black uppercase text-xs active:text-white">Acesso Administrativo 🔐</button>
                  </div>
              </div>
          );
      }

      // ==========================================
      // TELA: PIN MODAL
      // ==========================================
      if (view === 'pin_modal') {
          return (
              <div className="flex-1 flex flex-col p-6 bg-slate-900 justify-center items-center animate-fade-in">
                  <div className="bg-white w-full max-w-sm rounded-[50px] p-8 flex flex-col items-center shadow-2xl relative">
                      <div className="text-6xl mb-2">{userPendingPin.avatar}</div>
                      <h2 className="text-2xl font-black text-slate-800 mb-1">{userPendingPin.nome.split(' ')[0]}</h2>
                      <p className="text-slate-400 font-bold mb-6 text-sm tracking-tight">Digite seu PIN de 4 dígitos</p>
                      <div className="flex space-x-3 mb-8">
                        {[0, 1, 2, 3].map((i) => (<div key={i} className={`w-14 h-14 rounded-2xl flex items-center justify-center text-3xl font-black border-4 ${pinAttempt[i] ? 'border-brand text-brand bg-green-50' : 'border-slate-100 text-transparent bg-gray-50'}`}>{pinAttempt[i] || '•'}</div>))}
                      </div>
                      <div className="grid grid-cols-3 gap-3 w-full">
                          {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (<button key={num} onClick={() => setPinAttempt(pinAttempt + num)} disabled={pinAttempt.length >= 4} className="bg-gray-100 text-slate-800 text-2xl font-black py-4 rounded-2xl active:bg-slate-200">{num}</button>))}
                          <button onClick={() => setView('select_loja')} className="text-slate-300 font-black uppercase text-[10px]">Sair</button>
                          <button onClick={() => setPinAttempt(pinAttempt + '0')} disabled={pinAttempt.length >= 4} className="bg-gray-100 text-slate-800 text-2xl font-black py-4 rounded-2xl active:bg-slate-200">0</button>
                          <button onClick={() => setPinAttempt(pinAttempt.slice(0, -1))} className="bg-red-50 text-red-500 py-4 rounded-2xl flex items-center justify-center font-black">←</button>
                      </div>
                      <button onClick={handlePinSubmit} disabled={pinAttempt.length !== 4} className={`w-full py-5 mt-6 rounded-[30px] font-black text-xl text-white ${pinAttempt.length === 4 ? 'bg-brand' : 'bg-slate-200'}`}>ENTRAR</button>
                  </div>
              </div>
          );
      }

      // ==========================================
      // TELA: DASHBOARD (ADMIN)
      // ==========================================
      if (view === 'dashboard') {
          const dados = historico.filter(h => dashboardLojaFiltro === 'todas' || h.loja_id === parseInt(dashboardLojaFiltro));
          const totalPreju = dados.reduce((a,b)=>a+Number(b.custo_total),0);
          return (
              <div className="flex-1 flex flex-col bg-gray-100 h-full relative overflow-hidden animate-slide-up">
                  <div className="bg-slate-900 text-white p-6 pt-10 pb-8 rounded-b-[45px] shadow-2xl shrink-0">
                      <div className="flex justify-between items-center mb-6">
                          <div className="flex items-center gap-3"><RenderLogo size={40} /><h2 className="text-2xl font-black tracking-tighter">Painel Roy's</h2></div>
                          <button onClick={()=>setView('select_loja')} className="p-3 bg-slate-800 rounded-full text-xl active:scale-90">🚪</button>
                      </div>
                      <select value={dashboardLojaFiltro} onChange={(e)=>setDashboardLojaFiltro(e.target.value)} className="w-full bg-slate-800 p-4 rounded-2xl text-[10px] font-black mb-6 border border-slate-700 uppercase outline-none text-brand">
                          <option value="todas">🌐 VISÃO GLOBAL</option>
                          {lojas.map(l => <option key={l.id} value={l.id}>🏪 {l.nome.toUpperCase()}</option>)}
                      </select>
                      <div className="grid grid-cols-2 gap-4">
                          <div className="bg-slate-800 p-5 rounded-[25px] border-l-8 border-brand">
                              <p className="text-slate-500 text-[9px] font-black uppercase mb-1">Prejuízo</p>
                              <p className="text-xl font-black">{formatarMoeda(totalPreju)}</p>
                          </div>
                          <div className="bg-slate-800 p-5 rounded-[25px] border-l-8 border-red-500">
                              <p className="text-slate-500 text-[9px] font-black uppercase mb-1">Itens</p>
                              <p className="text-xl font-black">{dados.length}</p>
                          </div>
                      </div>
                  </div>
                  <div className="main-scroll p-6 space-y-8">
                      <div className="bg-white rounded-[45px] shadow-xl border-4 border-slate-50 overflow-hidden">
                          <div className="p-6 border-b bg-gray-50 font-black text-[10px] text-slate-400 uppercase tracking-widest text-center">Auditoria de Desperdícios</div>
                          <div className="divide-y divide-gray-50">
                              {dados.map(h => (
                                  <div key={h.id} className="p-5 flex gap-4 items-center active:bg-gray-50 transition-colors">
                                      {h.foto_url ? <img src={h.foto_url} className="w-14 h-14 rounded-2xl object-cover shadow-lg" /> : <div className="w-14 h-14 bg-gray-100 rounded-2xl flex items-center justify-center text-2xl">{h.img}</div>}
                                      <div className="flex-1 min-w-0">
                                          <p className="font-black text-slate-800 truncate text-sm tracking-tight uppercase">{h.prod} ({h.qtd}{h.uni})</p>
                                          <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">Causa: {h.responsavel}</p>
                                      </div>
                                      <div className="text-right">
                                          <p className="font-black text-red-500 text-sm">{formatarMoeda(h.custo_total)}</p>
                                          <p className="text-[9px] text-slate-300 font-black uppercase">{h.hora}</p>
                                      </div>
                                  </div>
                              ))}
                          </div>
                      </div>
                  </div>
                  <BottomNav />
              </div>
          );
      }

      // ==========================================
      // TELA: AJUSTES (IDENTIDADE VISUAL)
      // ==========================================
      if (view === 'manager_settings') {
          return (
              <div className="flex-1 flex flex-col bg-gray-100 h-full relative overflow-hidden animate-slide-up">
                  <div className="bg-slate-900 text-white p-8 pt-12 pb-10 rounded-b-[50px] shadow-lg flex justify-between items-center shrink-0">
                      <h2 className="text-3xl font-black uppercase tracking-tighter">Ajustes</h2>
                      <button onClick={()=>setView('dashboard')} className="bg-brand px-8 py-3 rounded-full font-black text-xs shadow-xl active:scale-95">OK</button>
                  </div>
                  <div className="main-scroll p-8 space-y-10">
                      <div className="bg-white p-10 rounded-[50px] shadow-xl space-y-10">
                          <div>
                              <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 block">Identidade Visual</label>
                              <div className="flex items-center gap-6">
                                  <RenderLogo size={100} />
                                  <label className="flex-1 bg-slate-900 text-white font-black p-5 rounded-3xl text-center text-xs cursor-pointer active:scale-95 transition-transform shadow-xl">
                                      TROCAR LOGO
                                      <input type="file" accept="image/*" className="hidden" onChange={(e) => { if(e.target.files[0]) setLojaLogo(URL.createObjectURL(e.target.files[0])); }} />
                                  </label>
                              </div>
                          </div>
                          <div>
                              <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Nome da Rede</label>
                              <input type="text" value={lojaNome} onChange={(e)=>setLojaNome(e.target.value)} className="w-full p-6 bg-gray-100 rounded-3xl font-black text-2xl border-4 border-transparent focus:border-brand outline-none transition-all" />
                          </div>
                          <button onClick={()=>alert('✅ Configurações Salvas!')} className="w-full bg-brand text-white font-black p-7 rounded-[35px] text-xl shadow-2xl active:scale-95 transition-transform">SALVAR TUDO</button>
                      </div>
                  </div>
                  <BottomNav />
              </div>
          );
      }

      // ==========================================
      // TELAS DE GESTÃO (UNIDADES / PRODUTOS / EQUIPE)
      // ==========================================
      if (view === 'manager_lojas') {
          return (
            <div className="flex-1 flex flex-col bg-gray-100 h-full relative overflow-hidden animate-slide-up">
                <div className="bg-slate-900 text-white p-8 pt-12 pb-10 rounded-b-[50px] flex justify-between items-center shrink-0">
                    <h2 className="text-3xl font-black uppercase tracking-tighter">Lojas</h2>
                    <button onClick={()=>setView('dashboard')} className="bg-brand px-8 py-3 rounded-full font-black text-xs shadow-xl active:scale-95">OK</button>
                </div>
                <div className="main-scroll p-6 space-y-6">
                    <div className="bg-white p-8 rounded-[45px] shadow-md">
                        <input id="inLoja" placeholder="NOME DA UNIDADE" className="w-full p-5 bg-gray-100 rounded-2xl mb-4 font-black uppercase outline-none focus:border-brand border-2 border-transparent" />
                        <button onClick={async()=>{
                            const n=document.getElementById('inLoja').value; if(!n) return;
                            await supabase.from('lojas').insert([{nome:n}]); fetchDados(); document.getElementById('inLoja').value='';
                        }} className="w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-xl uppercase active:scale-95 transition-transform">ADICIONAR</button>
                    </div>
                    <div className="bg-white rounded-[40px] shadow-sm divide-y overflow-hidden">
                        {lojas.map(l => (
                            <div key={l.id} className="p-6 flex justify-between items-center bg-white active:bg-gray-50">
                                <span className="font-black text-slate-700 text-lg uppercase tracking-tight">🏪 {l.nome}</span>
                                <button onClick={async()=>{if(confirm('Excluir?')){await supabase.from('lojas').delete().eq('id', l.id); fetchDados();}}} className="text-red-300 font-black text-2xl p-2">×</button>
                            </div>
                        ))}
                    </div>
                </div>
                <BottomNav />
            </div>
          );
      }

      if (view === 'manager_produtos') {
        return (
          <div className="flex-1 flex flex-col bg-gray-100 h-full relative overflow-hidden animate-slide-up">
            <div className="bg-slate-900 text-white p-8 pt-12 pb-10 rounded-b-[50px] flex justify-between items-center shrink-0">
                <h2 className="text-3xl font-black uppercase tracking-tighter">Catálogo</h2>
                <button onClick={()=>setView('dashboard')} className="bg-brand px-8 py-3 rounded-full font-black text-xs shadow-xl active:scale-95">OK</button>
            </div>
            <div className="main-scroll p-6 space-y-6">
                <div className="bg-white p-8 rounded-[45px] shadow-xl space-y-6">
                    <div className="flex gap-4">
                        <input id="inIcon" placeholder="🎨" className="w-24 p-6 bg-gray-100 rounded-3xl font-black text-center text-3xl outline-none focus:border-brand border-2 border-transparent" />
                        <input id="inProd" placeholder="NOME DO ITEM" className="flex-1 p-6 bg-gray-100 rounded-3xl font-black text-xl outline-none focus:border-brand border-2 border-transparent uppercase" />
                    </div>
                    <input id="inCusto" type="number" placeholder="CUSTO UNITÁRIO R$" className="w-full p-6 bg-gray-100 rounded-3xl font-black text-xl outline-none focus:border-brand border-2 border-transparent" />
                    <button onClick={async()=>{
                        const n=document.getElementById('inProd').value; const i=document.getElementById('inIcon').value; const c=document.getElementById('inCusto').value;
                        if(!n)return; await supabase.from('produtos').insert([{nome:n, icone:i||'📦', custo:c||0}]); fetchDados();
                    }} className="w-full bg-slate-900 text-white p-6 rounded-[35px] font-black text-xl shadow-2xl uppercase active:scale-95">Salvar Produto</button>
                </div>
                <div className="grid grid-cols-2 gap-5 pb-32">
                    {produtosLista.map(p => (
                        <div key={p.id} className="bg-white p-8 rounded-[50px] shadow-xl relative flex flex-col items-center border border-slate-50">
                            <span className="text-6xl mb-4">{p.icone}</span>
                            <span className="font-black text-slate-800 text-center text-[10px] uppercase tracking-widest leading-tight">{p.nome}</span>
                            <span className="text-brand font-black text-lg mt-2">{formatarMoeda(p.custo)}</span>
                            <button onClick={async()=>{if(confirm('Apagar?')){await supabase.from('produtos').delete().eq('id', p.id); fetchDados();}}} className="absolute top-4 right-6 text-red-100 font-black text-2xl p-2">×</button>
                        </div>
                    ))}
                </div>
            </div>
            <BottomNav />
          </div>
        );
      }

      if (view === 'manager_equipe') {
        return (
          <div className="flex-1 flex flex-col bg-gray-100 h-full relative overflow-hidden animate-slide-up">
            <div className="bg-slate-900 text-white p-8 pt-12 pb-10 rounded-b-[50px] flex justify-between items-center shrink-0">
                <h2 className="text-3xl font-black uppercase tracking-tighter">Equipe</h2>
                <button onClick={()=>setView('dashboard')} className="bg-brand px-8 py-3 rounded-full font-black text-xs shadow-xl active:scale-95">OK</button>
            </div>
            <div className="main-scroll p-6 space-y-6">
                <div className="bg-white p-8 rounded-[45px] shadow-xl space-y-6 border border-slate-50">
                    <input id="inName" placeholder="NOME COMPLETO" className="w-full p-6 bg-gray-100 rounded-3xl font-black text-xl uppercase outline-none focus:border-brand border-2 border-transparent" />
                    <select id="inLojaId" className="w-full p-6 bg-gray-100 rounded-3xl font-black uppercase outline-none focus:border-brand border-2 border-transparent">
                        <option value="">Vincular à Unidade...</option>
                        {lojas.map(l => <option key={l.id} value={l.id}>{l.nome.toUpperCase()}</option>)}
                        <option value="">Acesso Global (Admin)</option>
                    </select>
                    <div className="flex gap-4">
                        <select id="inFuncao" className="flex-1 p-6 bg-gray-100 rounded-3xl font-black outline-none focus:border-brand border-2 border-transparent">
                            <option value="operacional">COZINHA</option>
                            <option value="gerente">GERENTE</option>
                            <option value="admin">ADMIN</option>
                        </select>
                        <input id="inPin" placeholder="PIN" maxLength="4" className="w-28 p-6 bg-gray-100 rounded-3xl font-black text-center text-xl outline-none focus:border-brand border-2 border-transparent" />
                    </div>
                    <button onClick={async()=>{
                        const n=document.getElementById('inName').value; const l=document.getElementById('inLojaId').value; const f=document.getElementById('inFuncao').value; const p=document.getElementById('inPin').value;
                        if(!n)return; await supabase.from('equipe').insert([{nome:n, loja_id:l?parseInt(l):null, funcao:f, codigo:p||null, avatar:f==='gerente'?'👔':(f==='admin'?'🛡️':'👨‍🍳')}]); fetchDados();
                    }} className="w-full bg-slate-900 text-white p-6 rounded-[30px] font-black text-xl shadow-2xl uppercase active:scale-95">Criar Acesso</button>
                </div>
                <div className="bg-white rounded-[45px] shadow-xl overflow-hidden divide-y divide-gray-50 pb-32">
                    {equipe.map(e => (
                        <div key={e.id} className="p-7 flex justify-between items-center active:bg-gray-50 transition-colors">
                            <div className="flex items-center gap-5">
                                <span className="text-5xl">{e.avatar}</span>
                                <div><p className="font-black text-slate-800 text-xl tracking-tighter uppercase">{e.nome}</p><p className="text-[10px] text-slate-400 font-black uppercase">{e.funcao}</p></div>
                            </div>
                            <button onClick={async()=>{if(confirm('Excluir?')){await supabase.from('equipe').delete().eq('id', e.id); fetchDados();}}} className="text-red-100 font-black text-2xl p-4">×</button>
                        </div>
                    ))}
                </div>
            </div>
            <BottomNav />
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

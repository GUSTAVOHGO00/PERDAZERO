            <div className="bg-slate-900 text-white p-6 pt-6 flex flex-col shadow-md z-10">
               <div className="flex justify-between items-center mb-4">
                 <div><p className="text-brand text-[10px] font-bold tracking-widest mb-1 uppercase">Painel {user.funcao}</p><h2 className="text-xl font-bold">{lojaNome}</h2></div>
                 <button onClick={() => {setUser(null); setView('select_loja');}} className="p-2 bg-slate-800 rounded-full hover:bg-slate-700"><IconLogout/></button>
               </div>
               
               {user.funcao === 'admin' && (
                  <div className="mb-3">
                      <select value={dashboardLojaFiltro} onChange={(e) => setDashboardLojaFiltro(e.target.value)} className="w-full bg-slate-800 text-white p-2.5 rounded-xl text-sm font-bold border border-slate-700 outline-none">
                          <option value="todas">🌐 Visão Global (Todas as Lojas)</option>
                          {lojas.map(l => <option key={l.id} value={l.id}>🏪 {l.nome}</option>)}
                      </select>
                  </div>
               )}

               <div className="flex bg-slate-800 p-1 rounded-xl w-full">
                  <button onClick={() => setFiltroTempo('hoje')} className={`flex-1 py-1.5 font-bold rounded-lg text-xs transition-colors ${filtroTempo === 'hoje' ? 'bg-slate-700 shadow-sm text-white' : 'text-slate-400'}`}>Hoje</button>
                  <button onClick={() => setFiltroTempo('semana')} className={`flex-1 py-1.5 font-bold rounded-lg text-xs transition-colors ${filtroTempo === 'semana' ? 'bg-slate-700 shadow-sm text-white' : 'text-slate-400'}`}>Semana</button>
                  <button onClick={() => setFiltroTempo('mes')} className={`flex-1 py-1.5 font-bold rounded-lg text-xs transition-colors ${filtroTempo === 'mes' ? 'bg-slate-700 shadow-sm text-white' : 'text-slate-400'}`}>Mês</button>
               </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-24 hide-scrollbar">
                <div className="grid grid-cols-2 gap-3">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 border-l-4 border-l-red-500"><p className="text-slate-400 text-[10px] font-bold tracking-wider uppercase mb-1">Itens Perdidos</p><p className="text-2xl font-black text-slate-800">{dadosDashboard.length}</p></div>
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 border-l-4 border-l-brand"><p className="text-slate-400 text-[10px] font-bold tracking-wider uppercase mb-1">Prejuízo (R$)</p><p className="text-2xl font-black text-slate-800">{formatarMoeda(totalPrejuizo).replace('R$', '').trim()}</p></div>
                </div>

                <div className="grid grid-cols-2 gap-3">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-3">Top 3: Causadores</h3>
                        <div className="space-y-2">
                        {topFuncionarios.length === 0 ? <p className="text-xs text-slate-400">Sem dados no período</p> : topFuncionarios.map((f, i) => (
                            <div key={i} className="flex justify-between items-center"><span className="text-xs font-bold text-slate-800 truncate pr-2">#{i+1} {f[0].split(' ')[0]}</span><span className="text-[10px] text-red-500 font-bold">{formatarMoeda(f[1])}</span></div>
                        ))}
                        </div>
                    </div>
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-3">Top 3: Produtos</h3>
                        <div className="space-y-2">
                        {topProdutos.length === 0 ? <p className="text-xs text-slate-400">Sem dados no período</p> : topProdutos.map((p, i) => (
                            <div key={i} className="flex justify-between items-center"><span className="text-xs font-bold text-slate-800 truncate pr-2">#{i+1} {p[0]}</span><span className="text-[10px] text-red-500 font-bold">{formatarMoeda(p[1])}</span></div>
                        ))}
                        </div>
                    </div>
                </div>
                
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Prejuízo (R$) por Categoria</h3>
                    <div className="chart-container"><canvas ref={chartDoughnutRef}></canvas></div>
                </div>

                <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Volume Perdido por Produto</h3>
                    <div className="chart-container"><canvas ref={chartBarRef}></canvas></div>
                </div>

                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mt-4">
                     <div className="p-4 border-b border-gray-50 bg-gray-50 flex justify-between items-center"><h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider">Auditoria de Registros</h3></div>
                     <div className="divide-y divide-gray-50">
                     {dadosDashboard.length === 0 ? <p className="p-6 text-center text-slate-400 font-medium">Nenhum registro no período.</p> : 
                      dadosDashboard.map(item => {
                          const lojaDoRegistro = lojas.find(l => l.id === item.loja_id)?.nome || "Remoto";
                          const isAnonimo = item.responsavel === 'Não identificado';
                          return (
                            <div key={item.id} className="p-4 flex gap-3">
                                {item.foto_url && (
                                    <button onClick={() => setFotoModal(item.foto_url)} className="relative w-12 h-12 bg-gray-100 rounded-xl overflow-hidden shadow-inner border border-gray-200 flex-shrink-0 active:scale-95 transition-transform group">
                                        <img src={item.foto_url} className="w-full h-full object-cover opacity-60 group-hover:opacity-30 transition-opacity" />
                                        <div className="absolute inset-0 flex items-center justify-center text-slate-800"><IconCameraSm/></div>
                                    </button>
                                )}
                                <div className="flex-1 overflow-hidden">
                                    <div className="flex justify-between items-start">
                                        <p className="font-bold text-sm text-slate-800 truncate">{item.img} {item.prod} <span className="text-brand text-xs">({item.qtd}{item.uni})</span></p>
                                        <div className="text-xs font-black text-slate-800">{formatarMoeda(item.custo_total)}</div>
                                    </div>
                                    <p className="text-[10px] text-red-500 font-bold mt-1 bg-red-50 inline-block px-1 rounded truncate">{item.motivo}</p>
                                    
                                    <div className="mt-2 bg-gray-50 p-2 rounded border border-gray-100">
                                        <p className="text-[9px] text-slate-500 uppercase font-bold tracking-wider mb-0.5">Responsável (Causa): <span className={isAnonimo ? "text-orange-500" : "text-slate-800"}>{item.responsavel}</span></p>
                                        <p className="text-[9px] text-slate-400 mb-1">Registrado por {item.relator} • {item.hora} • {lojaDoRegistro}</p>
                                        {item.observacao && (
                                            <div className="bg-yellow-50 border border-yellow-100 p-1.5 rounded mt-1">
                                                <p className="text-[10px] text-yellow-800 italic">"{item.observacao}"</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                          )
                      })}
                     </div>
                </div>
            </div>
            <BottomNav />
          </div>
        );
      }

      // ==========================================
      // TELA GERENTE: UNIDADES (LOJAS)
      // ==========================================
      if (view === 'manager_lojas') {
        const handleAddLoja = async () => {
          if(!novaLojaNome.trim()) return;
          const objNovo = { nome: novaLojaNome };
          
          if (supabase) {
             const { error } = await supabase.from('lojas').insert([objNovo]);
             if (error) return alert("ERRO AO SALVAR NO SUPABASE: " + error.message);
          }
          
          setLojas([{ id: Date.now(), ...objNovo }, ...lojas]);
          setNovaLojaNome('');
        };

        const startEditingLoja = (l) => { setEditingLojaId(l.id); setEditLojaNome(l.nome); };
        
        const handleSaveEditLoja = async (id) => { 
            if (supabase) { 
                const { error } = await supabase.from('lojas').update({nome: editLojaNome}).eq('id', id);
                if (error) return alert("ERRO AO ATUALIZAR: " + error.message);
            }
            setLojas(lojas.map(l => l.id === id ? { ...l, nome: editLojaNome } : l)); setEditingLojaId(null); 
        };
        
        const handleDeleteLoja = async (id) => { 
            if(window.confirm('Excluir esta unidade?')) { 
                if (supabase) { 
                    const { error } = await supabase.from('lojas').delete().eq('id', id);
                    if (error) return alert("ERRO AO EXCLUIR: " + error.message);
                }
                setLojas(lojas.filter(l => l.id !== id)); setEditingLojaId(null); 
            } 
        };

        return (
          <div className="flex-1 flex flex-col bg-gray-100 animate-slide-up h-full pb-safe-nav pt-safe-nav relative">
            <div className="bg-slate-900 text-white p-6 pt-6 shadow-md z-10 sticky top-0"><p className="text-brand text-xs font-bold tracking-widest mb-1">GESTÃO</p><h2 className="text-2xl font-bold">Unidades Operacionais</h2></div>
            <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-24 hide-scrollbar">
                
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
                    <h3 className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">Cadastrar Nova Unidade</h3>
                    <input type="text" value={novaLojaNome} onChange={e => setNovaLojaNome(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none mb-4" placeholder="Ex: Loja Sul" />
                    <button onClick={handleAddLoja} disabled={!novaLojaNome.trim()} className={`w-full font-bold p-3 rounded-xl shadow-md transition-colors ${novaLojaNome.trim() ? 'bg-brand text-white active:bg-green-600' : 'bg-gray-200 text-gray-400'}`}>Cadastrar Loja</button>
                </div>

                <div className="space-y-3">
                  {lojas.map(l => {
                    if (editingLojaId === l.id) {
                        return (
                            <div key={l.id} className="bg-white border-2 border-brand p-4 rounded-2xl flex flex-col shadow-lg animate-slide-up z-10">
                                <input value={editLojaNome} onChange={e=>setEditLojaNome(e.target.value)} className="font-bold text-slate-700 text-sm mb-3 border-b focus:border-brand focus:outline-none" placeholder="Nome da Loja" />
                                <div className="flex justify-between">
                                    <button onClick={() => handleDeleteLoja(l.id)} className="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-100"><IconDelete/></button>
                                    <button onClick={() => handleSaveEditLoja(l.id)} className="bg-brand text-white py-2 px-6 rounded-lg font-bold text-xs">Salvar</button>
                                </div>
                            </div>
                        )
                    } else {
                        return (
                            <div key={l.id} className="bg-white border border-gray-100 p-4 rounded-2xl flex items-center justify-between shadow-sm">
                              <div>
                                  <p className="font-bold text-slate-800 text-sm flex items-center">🏪 {l.nome}</p>
                              </div>
                              <button onClick={() => startEditingLoja(l)} className="text-slate-400 hover:text-brand p-3 bg-gray-50 rounded-full shadow-sm active:scale-95 transition-transform"><IconEdit/></button>
                            </div>
                        )
                    }
                  })}
                </div>
            </div>
            <BottomNav />
          </div>
        );
      }

      // ==========================================
      // TELA GERENTE: PRODUTOS
      // ==========================================
      if (view === 'manager_produtos') {
        const handleAddProduct = async () => {
          if(novoProdNome.trim() === '') return;
          const custoNum = parseFloat(novoProdCusto.replace(',', '.')) || 0;
          const objNovo = { nome: novoProdNome, icone: novoProdEmoji || '📦', custo: custoNum };
          
          if (supabase) { 
              const { error } = await supabase.from('produtos').insert([objNovo]);
              if (error) return alert("ERRO AO SALVAR PRODUTO: " + error.message);
          }
          
          setProdutosLista([{ id: Date.now(), ...objNovo }, ...produtosLista]);
          setNovoProdNome(''); setNovoProdEmoji('📦'); setNovoProdCusto('');
        };

        const startEditing = (prod) => { setEditingProductId(prod.id); setEditProdNome(prod.nome); setEditProdEmoji(prod.icone); setEditProdCusto(prod.custo.toString().replace('.', ',')); };
        
        const handleSaveEdit = async (id) => { 
            const custoNum = parseFloat(editProdCusto.replace(',', '.')) || 0; 
            const objSalvar = { nome: editProdNome, icone: editProdEmoji || '📦', custo: custoNum };
            
            if (supabase) { 
                const { error } = await supabase.from('produtos').update(objSalvar).eq('id', id);
                if (error) return alert("ERRO AO ATUALIZAR PRODUTO: " + error.message);
            }
            
            setProdutosLista(produtosLista.map(p => p.id === id ? { ...p, ...objSalvar } : p)); 
            setEditingProductId(null); 
        };
        
        const handleDeleteProduct = async (id) => { 
            if(window.confirm('Excluir item permanentemente?')) { 
                if (supabase) { 
                    const { error } = await supabase.from('produtos').delete().eq('id', id);
                    if (error) return alert("ERRO AO EXCLUIR: " + error.message);
                }
                setProdutosLista(produtosLista.filter(p => p.id !== id)); 
                setEditingProductId(null); 
            } 
        };

        return (
          <div className="flex-1 flex flex-col bg-gray-100 animate-slide-up h-full pb-safe-nav pt-safe-nav relative">
            <div className="bg-slate-900 text-white p-6 pt-6 shadow-md z-10 sticky top-0"><p className="text-brand text-xs font-bold tracking-widest mb-1">GESTÃO</p><h2 className="text-2xl font-bold">Cardápio de Perdas</h2></div>
            <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-24 hide-scrollbar">
                
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <h3 className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">Adicionar Novo</h3>
                    <div className="flex gap-2 mb-3">
                        <div className="w-16"><input type="text" maxLength="2" value={novoProdEmoji} onChange={e => setNovoProdEmoji(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-center text-2xl focus:border-brand focus:outline-none" placeholder="🍅" /></div>
                        <div className="flex-1"><input type="text" value={novoProdNome} onChange={e => {setNovoProdNome(e.target.value); setNovoProdEmoji(buscarEmoji(e.target.value));}} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none" placeholder="Nome (Ex: Tomate)" /></div>
                    </div>
                    <div className="mb-4"><input type="text" value={novoProdCusto} onChange={e => setNovoProdCusto(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none" placeholder="Custo Unitário (R$)" /></div>
                    <button onClick={handleAddProduct} disabled={!novoProdNome.trim()} className={`w-full font-bold p-4 rounded-xl shadow-md transition-colors ${novoProdNome.trim() ? 'bg-brand text-white active:bg-green-600' : 'bg-gray-200 text-gray-400'}`}>Adicionar Produto</button>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  {produtosLista.map(p => {
                    if (editingProductId === p.id) {
                        return (
                            <div key={p.id} className="bg-white border-2 border-brand p-4 rounded-2xl flex flex-col shadow-lg relative animate-slide-up z-10">
                                <input value={editProdEmoji} onChange={e=>setEditProdEmoji(e.target.value)} maxLength="2" className="text-3xl bg-gray-50 p-2 rounded-xl mb-2 text-center border focus:border-brand focus:outline-none" />
                                <input value={editProdNome} onChange={e=>{setEditProdNome(e.target.value); setEditProdEmoji(buscarEmoji(e.target.value));}} className="font-bold text-slate-700 text-sm text-center leading-tight mb-2 border-b focus:border-brand focus:outline-none" />
                                <input value={editProdCusto} onChange={e=>setEditProdCusto(e.target.value)} className="text-xs text-brand font-bold text-center border-b focus:border-brand focus:outline-none mb-3" placeholder="Custo R$" />
                                <div className="flex justify-between mt-auto">
                                    <button onClick={() => handleDeleteProduct(p.id)} className="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-100"><IconDelete/></button>
                                    <button onClick={() => handleSaveEdit(p.id)} className="bg-brand text-white p-2 rounded-lg font-bold text-xs px-4">Salvar</button>
                                </div>
                            </div>
                        )
                    } else {
                        return (
                            <div key={p.id} className="bg-white border border-gray-100 p-4 pt-8 rounded-2xl flex flex-col items-center shadow-sm relative group">
                              <button onClick={() => startEditing(p)} className="absolute top-2 right-2 text-slate-400 p-2 bg-gray-50 rounded-full shadow-sm hover:text-brand active:scale-95 transition-transform"><IconEdit/></button>
                              <span className="text-4xl bg-gray-50 p-3 rounded-2xl mb-2 shadow-inner">{p.icone}</span>
                              <span className="font-bold text-slate-700 text-sm text-center leading-tight mb-1">{p.nome}</span>
                              <span className="text-[10px] bg-green-50 text-brand px-2 py-0.5 rounded font-bold">{formatarMoeda(p.custo)}</span>
                            </div>
                        )
                    }
                  })}
                </div>
            </div>
            <BottomNav />
          </div>
        );
      }

      // ==========================================
      // TELA GERENTE: EQUIPE
      // ==========================================
      if (view === 'manager_equipe') {
        
        const canAddMembro = novoMembroNome.trim() !== '' && (novoMembroFuncao === 'operacional' || novoMembroCodigo.length === 4);

        const handleAddMembro = async () => {
          if(!canAddMembro) return;
          const lojaIdFormatado = novoMembroLoja === 'todas' ? null : parseInt(novoMembroLoja);
          
          const objSalvar = { nome: novoMembroNome, codigo: novoMembroFuncao === 'operacional' ? '' : novoMembroCodigo, funcao: novoMembroFuncao, loja_id: lojaIdFormatado, avatar: novoMembroAvatar };
          
          if (supabase) { 
              const { error } = await supabase.from('equipe').insert([objSalvar]);
              if (error) return alert("ERRO AO SALVAR EQUIPE: " + error.message);
          }
          
          setEquipe([{ id: Date.now(), ...objSalvar }, ...equipe]);
          setNovoMembroNome(''); setNovoMembroCodigo(''); setNovoMembroAvatar('👨‍🍳');
        };

        const startEditingMembro = (m) => { 
            setEditingMembroId(m.id); setEditMembroNome(m.nome); setEditMembroCodigo(m.codigo || ''); setEditMembroFuncao(m.funcao); setEditMembroAvatar(m.avatar || '👨‍🍳');
        };
        
        const handleSaveEditMembro = async (id) => { 
            if(editMembroFuncao !== 'operacional' && editMembroCodigo.length !== 4) return alert("Administradores e Gerentes precisam de um PIN de 4 dígitos."); 
            
            const objSalvar = { nome: editMembroNome, codigo: editMembroFuncao === 'operacional' ? '' : editMembroCodigo, funcao: editMembroFuncao, avatar: editMembroAvatar };
            
            if (supabase) { 
                const { error } = await supabase.from('equipe').update(objSalvar).eq('id', id);
                if (error) return alert("ERRO AO ATUALIZAR EQUIPE: " + error.message);
            }
            
            setEquipe(equipe.map(m => m.id === id ? { ...m, ...objSalvar } : m)); 
            setEditingMembroId(null); 
        };
        
        const handleDeleteMembro = async (id) => { 
            if(window.confirm('Remover acesso deste colaborador?')) { 
                if (supabase) { 
                    const { error } = await supabase.from('equipe').delete().eq('id', id);
                    if (error) return alert("ERRO AO EXCLUIR: " + error.message);
                }
                setEquipe(equipe.filter(m => m.id !== id)); setEditingMembroId(null); 
            } 
        };

        return (
          <div className="flex-1 flex flex-col bg-gray-100 animate-slide-up h-full pb-safe-nav pt-safe-nav relative">
            <div className="bg-slate-900 text-white p-6 pt-6 shadow-md z-10 sticky top-0"><p className="text-brand text-xs font-bold tracking-widest mb-1">GESTÃO</p><h2 className="text-2xl font-bold">Equipe Ativa</h2></div>
            <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-24 hide-scrollbar">
                
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
                    <h3 className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">Cadastrar Colaborador</h3>
                    <div className="space-y-3 mb-4">
                        
                        <div className="flex gap-2">
                            <select value={novoMembroAvatar} onChange={e => setNovoMembroAvatar(e.target.value)} className="w-20 bg-gray-50 border border-gray-200 rounded-xl p-2 text-center text-xl focus:border-brand focus:outline-none">
                                <option value="👨‍🍳">👨‍🍳</option>
                                <option value="👩‍🍳">👩‍🍳</option>
                                <option value="👔">👔</option>
                                <option value="🛡️">🛡️</option>
                            </select>
                            <input type="text" value={novoMembroNome} onChange={e => setNovoMembroNome(e.target.value)} className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none" placeholder="Nome Completo" />
                        </div>
                        
                        <select value={novoMembroLoja} onChange={e => setNovoMembroLoja(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none">
                            {lojas.map(l => <option key={l.id} value={l.id}>Loja: {l.nome}</option>)}
                            <option value="todas">Acesso Global (Administrador)</option>
                        </select>

                        <div className="flex gap-2">
                            {novoMembroFuncao !== 'operacional' ? (
                                <input type="text" inputMode="numeric" pattern="[0-9]*" maxLength="4" value={novoMembroCodigo} onChange={e => setNovoMembroCodigo(e.target.value.replace(/\D/g, '').slice(0,4))} className="w-24 bg-gray-50 border border-gray-200 rounded-xl p-3 text-center font-mono font-bold text-slate-800 focus:border-brand focus:outline-none" placeholder="PIN (4)" />
                            ) : (
                                <div className="w-24 bg-gray-100 border border-gray-200 rounded-xl p-3 text-center font-bold text-slate-400 text-xs flex items-center justify-center">S/ Senha</div>
                            )}
                            <select value={novoMembroFuncao} onChange={e => {
                                setNovoMembroFuncao(e.target.value);
                                if (e.target.value === 'operacional') setNovoMembroCodigo('');
                            }} className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none">
                                <option value="operacional">Nível: Cozinha/Operacional</option>
                                <option value="gerente">Nível: Gerente da Loja</option>
                                <option value="admin">Nível: Administrador</option>
                            </select>
                        </div>
                    </div>
                    <button onClick={handleAddMembro} disabled={!canAddMembro} className={`w-full font-bold p-3 rounded-xl shadow-md transition-colors ${canAddMembro ? 'bg-brand text-white active:bg-green-600' : 'bg-gray-200 text-gray-400'}`}>Criar Acesso</button>
                </div>

                <div className="space-y-3">
                  {equipe.map(m => {
                    const nomeLoja = lojas.find(l => l.id === m.loja_id)?.nome || "Rede (Todas)";
                    
                    if (editingMembroId === m.id) {
                        return (
                            <div key={m.id} className="bg-white border-2 border-brand p-4 rounded-2xl flex flex-col shadow-lg animate-slide-up z-10">
                                
                                <div className="flex gap-2 mb-3">
                                    <select value={editMembroAvatar} onChange={e=>setEditMembroAvatar(e.target.value)} className="w-16 text-center text-xl border-b focus:border-brand focus:outline-none bg-transparent">
                                        <option value="👨‍🍳">👨‍🍳</option>
                                        <option value="👩‍🍳">👩‍🍳</option>
                                        <option value="👔">👔</option>
                                        <option value="🛡️">🛡️</option>
                                    </select>
                                    <input value={editMembroNome} onChange={e=>setEditMembroNome(e.target.value)} className="flex-1 font-bold text-slate-700 text-sm border-b focus:border-brand focus:outline-none" placeholder="Nome" />
                                </div>
                                
                                <div className="flex gap-2 mb-3">
                                    {editMembroFuncao !== 'operacional' ? (
                                        <input type="text" inputMode="numeric" pattern="[0-9]*" value={editMembroCodigo} onChange={e=>setEditMembroCodigo(e.target.value.replace(/\D/g, '').slice(0,4))} className="w-20 text-center font-mono font-bold text-slate-800 border-b focus:border-brand focus:outline-none" placeholder="PIN" />
                                    ) : (
                                        <div className="w-20 text-center font-bold text-slate-400 text-[10px] border-b flex items-center justify-center bg-gray-50 rounded">S/ SENHA</div>
                                    )}
                                    <select value={editMembroFuncao} onChange={e => {
                                        setEditMembroFuncao(e.target.value);
                                        if (e.target.value === 'operacional') setEditMembroCodigo('');
                                    }} className="flex-1 text-xs border-b focus:outline-none">
                                        <option value="operacional">Operacional</option>
                                        <option value="gerente">Gerente</option>
                                        <option value="admin">Administrador</option>
                                    </select>
                                </div>
                                <div className="flex justify-between mt-2">
                                    <button onClick={() => handleDeleteMembro(m.id)} className="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-100"><IconDelete/></button>
                                    <button onClick={() => handleSaveEditMembro(m.id)} className="bg-brand text-white py-2 px-6 rounded-lg font-bold text-xs">Salvar</button>
                                </div>
                            </div>
                        )
                    } else {
                        return (
                            <div key={m.id} className="bg-white border border-gray-100 p-4 rounded-2xl flex items-center justify-between shadow-sm">
                              <div>
                                  <p className="font-bold text-slate-800 text-sm flex items-center">{m.avatar} {m.nome} 
                                      {m.funcao !== 'operacional' && <span className="ml-2 text-[8px] bg-slate-800 text-white px-1.5 py-0.5 rounded uppercase">{m.funcao}</span>}
                                  </p>
                                  <p className="text-[10px] text-slate-400 font-bold mt-1 uppercase tracking-wider">
                                    📍 {nomeLoja} • {m.funcao === 'operacional' ? 'Sem Senha' : <>Senha: <span className="bg-gray-100 px-1 rounded font-mono">{m.codigo}</span></>}
                                  </p>
                              </div>
                              <button onClick={() => startEditingMembro(m)} className="text-slate-400 hover:text-brand p-3 bg-gray-50 rounded-full shadow-sm active:scale-95 transition-transform"><IconEdit/></button>
                            </div>
                        )
                    }
                  })}
                </div>
            </div>
            <BottomNav />
          </div>
        );
      }

      // ==========================================
      // TELA GERENTE: AJUSTES (Logo & Nome)
      // ==========================================
      if (view === 'manager_settings') {
        const handleSaveSettings = () => { 
            localStorage.setItem('lojaNome', lojaNome);
            if(lojaLogo) localStorage.setItem('lojaLogo', lojaLogo);
            alert('✅ Configurações salvas permanentemente no aparelho!'); 
            setView('dashboard'); 
        };

        return (
          <div className="flex-1 flex flex-col bg-gray-100 animate-slide-up h-full pb-safe-nav pt-safe-nav relative">
            <div className="bg-slate-900 text-white p-6 pt-6 shadow-md z-10 sticky top-0"><p className="text-brand text-xs font-bold tracking-widest mb-1">CONFIGURAÇÕES</p><h2 className="text-2xl font-bold">Ajustes do Sistema</h2></div>
            <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <h3 className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">Identidade Visual</h3>
                    
                    <div className="mb-6">
                        <label className="text-[10px] font-bold text-slate-400 uppercase">Logomarca (Imagem)</label>
                        <div className="flex items-center gap-4 mt-2">
                            <div className="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center overflow-hidden border border-gray-200 text-slate-400 shadow-inner">
                                {lojaLogo ? <img src={lojaLogo} className="w-full h-full object-cover" /> : <IconShield />}
                            </div>
                            <label className="flex-1 bg-white border border-gray-200 text-slate-600 text-sm font-bold p-3 rounded-xl text-center cursor-pointer hover:bg-gray-50 transition-colors shadow-sm active:scale-95">
                                Alterar Logo
                                <input type="file" accept="image/*" className="hidden" onChange={(e) => {
                                    if(e.target.files && e.target.files[0]) { 
                                        const reader = new FileReader();
                                        reader.onloadend = () => setLojaLogo(reader.result);
                                        reader.readAsDataURL(e.target.files[0]);
                                    }
                                }} />
                            </label>
                        </div>
                    </div>

                    <div className="mb-6">
                        <label className="text-[10px] font-bold text-slate-400 uppercase">Nome da Rede</label>
                        <input type="text" value={lojaNome} onChange={e => setLojaNome(e.target.value)} className="w-full mt-2 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none" />
                    </div>
                    
                    <button onClick={handleSaveSettings} className="w-full bg-slate-900 text-white font-bold p-4 rounded-xl shadow-md active:scale-95 transition-transform">Salvar Alterações</button>
                </div>
            </div>
            <BottomNav />
          </div>
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

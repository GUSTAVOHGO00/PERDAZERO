<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PerdaZero - PRO MultiLojas</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .bg-brand { background-color: #00A86B; }
    .text-brand { color: #00A86B; }
    .border-brand { border-color: #00A86B; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .chart-container { position: relative; width: 100%; height: 200px; }
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-gray-200 h-[100dvh] w-screen overflow-hidden flex justify-center">

  <div id="root" class="w-full h-full max-w-md bg-white shadow-2xl overflow-hidden flex flex-col relative"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ⚠️ SUAS CHAVES DO SUPABASE (CONFIGURADAS)
    // ==========================================
    const SUPABASE_URL = 'https://svibstwhmygwczobybse.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2aWJzdHdobXlnd2N6b2J5YnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDAyNzAsImV4cCI6MjA5MTE3NjI3MH0.nlOAfAfsz7BHs3LkBIBG5xNxVv2i7-BCGgj7uPR7dSg';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function App() {
      // --- ESTADOS GLOBAIS ---
      const [view, setView] = useState('select_loja'); 
      const [user, setUser] = useState(null); 
      const [currentLoja, setCurrentLoja] = useState(null);
      const [loading, setLoading] = useState(true);
      
      const [lojas, setLojas] = useState([]);
      const [equipe, setEquipe] = useState([]);
      const [produtosLista, setProdutosLista] = useState([]);
      const [historico, setHistorico] = useState([]);
      
      const [dashboardLojaFiltro, setDashboardLojaFiltro] = useState('todas');
      const [flowStep, setFlowStep] = useState(1);
      const [isSaving, setIsSaving] = useState(false);

      // Estado do Registro
      const [registro, setRegistro] = useState({ foto_arquivo: null, foto_url_local: null, produto: null, qtd: '', unidade: 'un', motivo: null, responsavel: null, observacao: '', custo_unitario: 0, icone: '📦' });
      const [customProductName, setCustomProductName] = useState('');
      const [customProductEmoji, setCustomProductEmoji] = useState('📦');
      const [isCustomMotivo, setIsCustomMotivo] = useState(false);
      const [customMotivoName, setCustomMotivoName] = useState('');
      const [showColegasList, setShowColegasList] = useState(false);
      const [selectedColega, setSelectedColega] = useState(null);
      const [observacaoColega, setObservacaoColega] = useState('');
      const [fotoModal, setFotoModal] = useState(null);

      useEffect(() => { fetchDados(); }, []);

      async function fetchDados() {
        setLoading(true);
        const { data: dl } = await supabase.from('lojas').select('*').order('nome');
        const { data: de } = await supabase.from('equipe').select('*').order('nome');
        const { data: dp } = await supabase.from('produtos').select('*').order('nome');
        const { data: dh } = await supabase.from('historico').select('*').order('id', { ascending: false });
        
        if(dl) setLojas(dl);
        if(de) setEquipe(de);
        if(dp) setProdutosLista(dp);
        if(dh) setHistorico(dh);
        setLoading(false);
      }

      const formatarMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

      const buscarEmoji = (t) => {
        const dict = {'carne':'🥩','pao':'🍞','batata':'🍟','refri':'🥤','ovo':'🥚','salada':'🥗','frango':'🍗','queijo':'🧀'};
        const low = t.toLowerCase();
        for (const [k, e] of Object.entries(dict)) { if(low.includes(k)) return e; }
        return '📦';
      };

      // --- GRÁFICOS ---
      const chartBarRef = useRef(null);
      const chartBarInstance = useRef(null);

      useEffect(() => {
        if (view === 'dashboard' && !loading && chartBarRef.current) {
            if (chartBarInstance.current) chartBarInstance.current.destroy();
            const dados = historico.filter(h => dashboardLojaFiltro === 'todas' || h.loja_id === parseInt(dashboardLojaFiltro));
            const labels = [...new Set(dados.map(d => d.prod))];
            const valores = labels.map(p => dados.filter(x => x.prod === p).reduce((a,b) => a + Number(b.qtd), 0));

            chartBarInstance.current = new Chart(chartBarRef.current, {
                type: 'bar',
                data: {
                    labels: labels.length ? labels : ['Sem dados'],
                    datasets: [{ label: 'Volume', data: valores.length ? valores : [0], backgroundColor: '#00A86B', borderRadius: 5 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
      }, [view, loading, dashboardLojaFiltro, historico]);

      if (loading) return <div className="flex-1 flex items-center justify-center bg-slate-900 text-white font-bold">Carregando PerdaZero...</div>;

      // ==========================================
      // COMPONENTES DE VISÃO
      // ==========================================

      if (view === 'select_loja') {
        return (
          <div className="flex-1 flex flex-col p-6 bg-slate-900 justify-center animate-fade-in">
            <div className="text-center mb-10">
                <h1 className="text-4xl font-black text-white">Perda<span className="text-brand">Zero</span></h1>
                <p className="text-slate-400 mt-2">Roy's Store - Controle de Desperdício</p>
            </div>
            <div className="space-y-3">
              {lojas.map(l => (
                <button key={l.id} onClick={() => { setCurrentLoja(l); setView('select_user'); }} className="w-full bg-slate-800 p-5 rounded-2xl text-white font-bold flex justify-between items-center active:scale-95 border border-slate-700">
                  {l.nome} <span className="text-2xl">🏪</span>
                </button>
              ))}
              <button onClick={() => { setUser({funcao:'admin', nome: 'Walney'}); setView('dashboard'); }} className="w-full mt-8 border-2 border-dashed border-slate-700 p-4 rounded-2xl text-slate-500 font-bold">Acesso Administrativo</button>
            </div>
          </div>
        );
      }

      if (view === 'select_user') {
          const equipeLoja = equipe.filter(e => e.loja_id === currentLoja.id || e.funcao === 'admin');
          return (
              <div className="flex-1 flex flex-col bg-gray-50 animate-slide-up">
                  <div className="bg-brand p-8 text-white rounded-b-[40px] shadow-lg text-center">
                      <p className="text-green-100 text-xs font-bold uppercase tracking-widest mb-1">{currentLoja.nome}</p>
                      <h2 className="text-3xl font-black">Quem é você?</h2>
                  </div>
                  <div className="flex-1 p-6 grid grid-cols-2 gap-4 overflow-y-auto">
                      {equipeLoja.map(e => (
                          <button key={e.id} onClick={() => { setUser(e); setView(e.funcao === 'operacional' ? 'home_func' : 'dashboard'); }} className="bg-white border p-6 rounded-3xl flex flex-col items-center shadow-sm active:scale-95">
                              <span className="text-5xl mb-2">{e.avatar || '👤'}</span>
                              <span className="font-bold text-slate-700">{e.nome.split(' ')[0]}</span>
                          </button>
                      ))}
                  </div>
                  <button onClick={() => setView('select_loja')} className="p-6 text-slate-400 font-bold text-sm">← Voltar / Trocar Loja</button>
              </div>
          );
      }

      if (view === 'home_func') {
          return (
              <div className="flex-1 flex flex-col bg-gray-50 animate-slide-up">
                  <div className="bg-brand p-8 text-white rounded-b-[40px] shadow-lg flex justify-between items-center">
                      <div><p className="text-green-100 text-xs font-bold">BOM TRABALHO,</p><h2 className="text-2xl font-black">{user.nome.split(' ')[0]}</h2></div>
                      <button onClick={() => setView('select_user')} className="bg-white/20 p-3 rounded-full">Logout</button>
                  </div>
                  <div className="flex-1 flex flex-col items-center justify-center p-6">
                      <button onClick={() => { setFlowStep(1); setView('flow'); }} className="w-full max-w-xs aspect-square bg-red-50 border-4 border-red-500 rounded-[50px] flex flex-col items-center justify-center text-red-600 active:scale-95 shadow-2xl">
                          <span className="text-6xl mb-4">📸</span>
                          <span className="text-2xl font-black uppercase text-center">Fotografar<br/>Perda</span>
                      </button>
                  </div>
              </div>
          );
      }

      if (view === 'flow') {
          const finishFlow = async (nomeResp) => {
              setIsSaving(true);
              const qtdNum = parseFloat(registro.qtd.toString().replace(',', '.')) || 0;
              const custoT = qtdNum * registro.custo_unitario;
              
              let finalPhotoUrl = null;
              if (registro.foto_arquivo) {
                  const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.jpg`;
                  const { data: upData } = await supabase.storage.from('fotos_perdas').upload(fileName, registro.foto_arquivo);
                  if(upData) {
                      const { data: pub } = supabase.storage.from('fotos_perdas').getPublicUrl(fileName);
                      finalPhotoUrl = pub.publicUrl;
                  }
              }

              const { error } = await supabase.from('historico').insert([{
                  loja_id: currentLoja.id, relator: user.nome, responsavel: nomeResp, prod: registro.produto,
                  qtd: qtdNum, uni: registro.unidade, motivo: registro.motivo, observacao: observacaoColega,
                  hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
                  img: registro.icone, custo_total: custoT, foto_url: finalPhotoUrl, timestamp: Date.now()
              }]);

              setIsSaving(false);
              alert('✅ Registro salvo!');
              fetchDados();
              setView('home_func');
              setRegistro({ foto_arquivo: null, foto_url_local: null, produto: null, qtd: '', unidade: 'un', motivo: null, responsavel: null, observacao: '', custo_unitario: 0, icone: '📦' });
          };

          if (isSaving) return <div className="flex-1 flex flex-col items-center justify-center bg-slate-900 text-white"><div className="w-12 h-12 border-4 border-brand border-t-transparent rounded-full animate-spin mb-4"></div>Salvando...</div>;

          return (
              <div className="flex-1 flex flex-col bg-white">
                  <div className="p-4 border-b flex justify-between items-center text-slate-400 font-bold text-xs uppercase tracking-widest">
                      <button onClick={() => setView('home_func')}>X Sair</button>
                      <span>Passo {flowStep} de 5</span>
                      <div className="w-10"></div>
                  </div>

                  {flowStep === 1 && (
                      <div className="flex-1 p-6 flex flex-col items-center justify-center text-center animate-slide-up">
                          <h3 className="text-2xl font-black mb-8">Tire uma foto do item</h3>
                          <label className="w-full py-6 bg-brand text-white font-black rounded-3xl text-xl shadow-xl flex items-center justify-center gap-2">
                              📷 Abrir Câmera
                              <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e)=>{
                                  if(e.target.files[0]) {
                                      setRegistro({...registro, foto_arquivo: e.target.files[0], foto_url_local: URL.createObjectURL(e.target.files[0])});
                                      setFlowStep(2);
                                  }
                              }} />
                          </label>
                          <button onClick={()=>setFlowStep(2)} className="mt-8 text-slate-400 underline font-bold">Pular Foto</button>
                      </div>
                  )}

                  {flowStep === 2 && (
                      <div className="flex-1 p-6 flex flex-col animate-slide-up bg-gray-50">
                          <h3 className="text-xl font-black mb-4">O que é isso?</h3>
                          <input autoFocus placeholder="Ex: Tomate" value={customProductName} onChange={(e)=>{setCustomProductName(e.target.value); setCustomProductEmoji(buscarEmoji(e.target.value));}} className="w-full p-5 rounded-2xl border-2 border-brand font-bold text-lg mb-4 focus:outline-none shadow-sm" />
                          <div className="grid grid-cols-2 gap-3 overflow-y-auto hide-scrollbar">
                              {produtosLista.map(p => (
                                  <button key={p.id} onClick={()=>{setRegistro({...registro, produto: p.nome, icone: p.icone, custo_unitario: p.custo}); setFlowStep(3);}} className="bg-white border p-4 rounded-2xl flex items-center gap-3 shadow-sm active:bg-green-50">
                                      <span className="text-2xl">{p.icone}</span><span className="font-bold text-slate-700 text-sm">{p.nome}</span>
                                  </button>
                              ))}
                          </div>
                          {customProductName && <button onClick={()=>{setRegistro({...registro, produto: customProductName, icone: customProductEmoji, custo_unitario:0}); setFlowStep(3);}} className="mt-4 w-full py-4 bg-slate-900 text-white font-bold rounded-2xl shadow-lg">Confirmar: {customProductName}</button>}
                      </div>
                  )}

                  {flowStep === 3 && (
                      <div className="flex-1 p-6 flex flex-col items-center animate-slide-up bg-gray-50">
                          <h3 className="text-xl font-black mb-1">Qual a quantidade?</h3>
                          <p className="text-brand font-black text-2xl mb-8">{registro.icone} {registro.produto}</p>
                          <div className="text-7xl font-black text-slate-800 mb-8">{registro.qtd || '0'}<span className="text-xl text-slate-400 ml-2">{registro.unidade}</span></div>
                          <div className="grid grid-cols-3 gap-3 w-full max-w-xs">
                              {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={()=>setRegistro({...registro, qtd: registro.qtd + n})} className="bg-white p-5 rounded-2xl font-black text-2xl shadow-sm active:bg-gray-100">{n}</button>)}
                              <button onClick={()=>setRegistro({...registro, qtd: registro.qtd + ','})} className="bg-white p-5 rounded-2xl font-black text-2xl shadow-sm">,</button>
                              <button onClick={()=>setRegistro({...registro, qtd: registro.qtd + '0'})} className="bg-white p-5 rounded-2xl font-black text-2xl shadow-sm">0</button>
                              <button onClick={()=>setRegistro({...registro, qtd: registro.qtd.slice(0,-1)})} className="bg-red-50 text-red-500 p-5 rounded-2xl font-black text-2xl shadow-sm">←</button>
                          </div>
                          <button onClick={()=>setFlowStep(4)} disabled={!registro.qtd} className={`mt-auto w-full py-5 rounded-3xl font-black text-xl text-white ${registro.qtd ? 'bg-brand' : 'bg-gray-300'}`}>AVANÇAR</button>
                      </div>
                  )}

                  {flowStep === 4 && (
                      <div className="flex-1 p-6 animate-slide-up bg-gray-50">
                          <h3 className="text-2xl font-black mb-6">Por que foi perdido?</h3>
                          <div className="grid grid-cols-2 gap-4">
                              {motivosLista.map(m => (
                                  <button key={m.id} onClick={()=>{setRegistro({...registro, motivo: m.nome}); setFlowStep(5);}} className="bg-white p-6 rounded-3xl flex flex-col items-center shadow-sm border active:border-brand">
                                      <span className="text-4xl mb-2">{m.icone}</span><span className="font-bold text-slate-700 text-sm">{m.nome}</span>
                                  </button>
                              ))}
                          </div>
                      </div>
                  )}

                  {flowStep === 5 && (
                      <div className="flex-1 p-6 flex flex-col items-center justify-center text-center animate-slide-up bg-gray-50">
                          <h3 className="text-3xl font-black mb-2">Você sabe quem foi?</h3>
                          <p className="text-slate-500 mb-10 text-sm">Fique tranquilo(a)! Esta informação é sigilosa e ajuda na gestão da cozinha.</p>
                          <div className="w-full space-y-4">
                              <button onClick={()=>finishFlow(user.nome)} className="w-full py-5 bg-white border rounded-3xl font-black text-slate-700 text-lg shadow-sm">🙋‍♂️ Fui eu mesmo</button>
                              <button onClick={()=>finishFlow('Não identificado')} className="w-full py-5 bg-white border rounded-3xl font-black text-slate-700 text-lg shadow-sm">🤷‍♂️ Não sei / Achei assim</button>
                              <button onClick={()=>setShowColegasList(true)} className="w-full py-5 bg-white border rounded-3xl font-black text-brand text-lg shadow-sm">Foi outra pessoa...</button>
                          </div>
                          {showColegasList && (
                              <div className="absolute inset-0 bg-white p-6 animate-slide-up z-20 flex flex-col">
                                  <h3 className="text-xl font-black mb-4">Selecione o Colega:</h3>
                                  <div className="grid grid-cols-2 gap-3 overflow-y-auto">
                                      {equipe.filter(e => e.loja_id === currentLoja.id).map(c => (
                                          <button key={c.id} onClick={()=>{setSelectedColega(c.nome); finishFlow(c.nome);}} className="bg-gray-50 p-4 rounded-2xl flex flex-col items-center border">
                                              <span className="text-3xl mb-1">{c.avatar}</span><span className="font-bold text-xs">{c.nome}</span>
                                          </button>
                                      ))}
                                  </div>
                                  <button onClick={()=>setShowColegasList(false)} className="mt-auto p-4 font-bold text-slate-400">Cancelar</button>
                              </div>
                          )}
                      </div>
                  )}
              </div>
          );
      }

      if (view === 'dashboard') {
        const dadosF = historico.filter(h => dashboardLojaFiltro === 'todas' || h.loja_id === parseInt(dashboardLojaFiltro));
        const totalP = dadosF.reduce((a,b) => a + (Number(b.custo_total) || 0), 0);
        return (
          <div className="flex-1 flex flex-col bg-gray-100 overflow-hidden relative">
            <div className="bg-slate-900 text-white p-6 pt-10">
                <div className="flex justify-between items-center mb-4">
                    <h2 className="text-xl font-bold">Painel Gerencial</h2>
                    <button onClick={() => setView('select_loja')} className="p-2 bg-slate-800 rounded-full">🚪</button>
                </div>
                <select value={dashboardLojaFiltro} onChange={(e) => setDashboardLojaFiltro(e.target.value)} className="w-full bg-slate-800 p-3 rounded-xl text-xs font-bold mb-4 border border-slate-700">
                    <option value="todas">🌐 Visão Global (Todas as Lojas)</option>
                    {lojas.map(l => <option key={l.id} value={l.id}>🏪 {l.nome}</option>)}
                </select>
                <div className="grid grid-cols-2 gap-3">
                    <div className="bg-slate-800 p-4 rounded-xl border-l-4 border-brand">
                        <p className="text-slate-400 text-[10px] uppercase font-bold">Prejuízo</p>
                        <p className="text-xl font-black">{formatarMoeda(totalP)}</p>
                    </div>
                    <div className="bg-slate-800 p-4 rounded-xl border-l-4 border-red-500">
                        <p className="text-slate-400 text-[10px] uppercase font-bold">Itens</p>
                        <p className="text-xl font-black">{dadosF.length}</p>
                    </div>
                </div>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-28 hide-scrollbar">
                <div className="bg-white p-4 rounded-2xl shadow-sm border h-52">
                    <canvas ref={chartBarRef}></canvas>
                </div>
                <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div className="p-4 border-b bg-gray-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Auditoria de Registros</div>
                    <div className="divide-y">
                        {dadosF.map(h => (
                            <div key={h.id} className="p-4 flex justify-between items-center active:bg-gray-50">
                                <div>
                                    <p className="font-bold text-sm text-slate-800">{h.img} {h.prod} ({h.qtd}{h.uni})</p>
                                    <p className="text-[10px] text-slate-400 uppercase font-medium">{h.responsavel} • Por {h.relator}</p>
                                </div>
                                <div className="text-right">
                                    <p className="font-black text-red-500 text-sm">{formatarMoeda(h.custo_total)}</p>
                                    <p className="text-[9px] text-slate-300 font-bold">{h.hora}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
            <div className="absolute bottom-0 w-full bg-white border-t flex justify-around p-2 pb-8 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
                <button onClick={() => setView('dashboard')} className="flex flex-col items-center text-brand font-bold text-[9px]">📊<br/>PAINEL</button>
                <button onClick={() => setView('manager_produtos')} className="flex flex-col items-center text-slate-300 font-bold text-[9px]">📦<br/>PRODUTOS</button>
                <button onClick={() => setView('manager_lojas')} className="flex flex-col items-center text-slate-300 font-bold text-[9px]">🏪<br/>LOJAS</button>
                <button onClick={() => setView('manager_equipe')} className="flex flex-col items-center text-slate-300 font-bold text-[9px]">👥<br/>EQUIPE</button>
            </div>
          </div>
        );
      }

      if (view === 'manager_lojas') {
        return (
          <div className="flex-1 flex flex-col bg-gray-100">
            <div className="bg-slate-900 text-white p-6 pt-10 flex justify-between items-center">
                <h2 className="text-xl font-bold">Lojas</h2>
                <button onClick={() => setView('dashboard')} className="text-xs bg-slate-800 px-4 py-2 rounded-full text-brand font-bold shadow-lg">VOLTAR</button>
            </div>
            <div className="p-4 space-y-4">
                <div className="bg-white p-5 rounded-2xl border shadow-sm">
                    <input id="inLoja" type="text" placeholder="Nome da Unidade" className="w-full border-2 p-4 rounded-xl mb-3 text-sm font-bold focus:border-brand outline-none" />
                    <button onClick={async () => {
                        const n = document.getElementById('inLoja').value;
                        if(!n) return;
                        await supabase.from('lojas').insert([{ nome: n }]);
                        fetchDados();
                        document.getElementById('inLoja').value = '';
                    }} className="w-full bg-brand text-white font-black p-4 rounded-xl shadow-lg active:scale-95 transition-transform">Salvar Unidade</button>
                </div>
                <div className="bg-white rounded-2xl border divide-y overflow-hidden shadow-sm">
                    {lojas.map(l => (
                        <div key={l.id} className="p-5 flex justify-between items-center">
                            <span className="font-bold text-slate-700">🏪 {l.nome}</span>
                            <button onClick={async () => { if(confirm('Excluir?')) { await supabase.from('lojas').delete().eq('id', l.id); fetchDados(); } }} className="text-red-400 text-[10px] font-black tracking-widest">EXCLUIR</button>
                        </div>
                    ))}
                </div>
            </div>
          </div>
        );
      }

      if (view === 'manager_produtos') {
        return (
          <div className="flex-1 flex flex-col bg-gray-100">
            <div className="bg-slate-900 text-white p-6 pt-10 flex justify-between items-center">
                <h2 className="text-xl font-bold">Produtos</h2>
                <button onClick={() => setView('dashboard')} className="text-xs bg-slate-800 px-4 py-2 rounded-full text-brand font-bold">VOLTAR</button>
            </div>
            <div className="p-4 space-y-4 overflow-y-auto hide-scrollbar">
                <div className="bg-white p-5 rounded-2xl border shadow-sm space-y-3">
                    <div className="flex gap-3">
                        <input id="inIcon" type="text" placeholder="Emoji" className="w-20 border-2 p-4 rounded-xl text-center" />
                        <input id="inProd" type="text" placeholder="Nome do Item" className="flex-1 border-2 p-4 rounded-xl text-sm font-bold focus:border-brand outline-none" />
                    </div>
                    <input id="inCusto" type="number" placeholder="Custo Unitário (R$)" className="w-full border-2 p-4 rounded-xl text-sm font-bold focus:border-brand outline-none" />
                    <button onClick={async () => {
                        const n = document.getElementById('inProd').value;
                        const i = document.getElementById('inIcon').value;
                        const c = document.getElementById('inCusto').value;
                        if(!n) return;
                        await supabase.from('produtos').insert([{ nome: n, icone: i || '📦', custo: c || 0 }]);
                        fetchDados();
                        document.getElementById('inProd').value = '';
                    }} className="w-full bg-brand text-white font-black p-4 rounded-xl shadow-lg">Cadastrar Item</button>
                </div>
                <div className="grid grid-cols-2 gap-3">
                    {produtosLista.map(p => (
                        <div key={p.id} className="bg-white p-5 rounded-2xl border text-center relative shadow-sm">
                            <span className="text-4xl block mb-2">{p.icone}</span>
                            <p className="font-bold text-xs text-slate-700">{p.nome}</p>
                            <p className="text-brand text-xs font-black mt-1">{formatarMoeda(p.custo)}</p>
                            <button onClick={async () => { if(confirm('Remover?')) { await supabase.from('produtos').delete().eq('id', p.id); fetchDados(); } }} className="absolute top-2 right-2 text-red-200 font-bold">×</button>
                        </div>
                    ))}
                </div>
            </div>
          </div>
        );
      }

      if (view === 'manager_equipe') {
        return (
          <div className="flex-1 flex flex-col bg-gray-100">
            <div className="bg-slate-900 text-white p-6 pt-10 flex justify-between items-center">
                <h2 className="text-xl font-bold">Equipe</h2>
                <button onClick={() => setView('dashboard')} className="text-xs bg-slate-800 px-4 py-2 rounded-full text-brand font-bold">VOLTAR</button>
            </div>
            <div className="p-4 space-y-4">
                <div className="bg-white p-5 rounded-2xl border shadow-sm space-y-3">
                    <input id="inName" type="text" placeholder="Nome Completo" className="w-full border-2 p-4 rounded-xl text-sm font-bold outline-none focus:border-brand" />
                    <select id="inLojaId" className="w-full border-2 p-4 rounded-xl text-sm font-bold bg-white outline-none">
                        <option value="">Vincular à Unidade...</option>
                        {lojas.map(l => <option key={l.id} value={l.id}>{l.nome}</option>)}
                    </select>
                    <select id="inFuncao" className="w-full border-2 p-4 rounded-xl text-sm font-bold bg-white outline-none">
                        <option value="operacional">Cozinha / Operacional</option>
                        <option value="gerente">Gerente da Loja</option>
                        <option value="admin">Administrador Geral</option>
                    </select>
                    <button onClick={async () => {
                        const n = document.getElementById('inName').value;
                        const l = document.getElementById('inLojaId').value;
                        const f = document.getElementById('inFuncao').value;
                        if(!n) return;
                        await supabase.from('equipe').insert([{ nome: n, loja_id: l || null, funcao: f, avatar: f === 'gerente' ? '👔' : '👨‍🍳' }]);
                        fetchDados();
                        document.getElementById('inName').value = '';
                    }} className="w-full bg-brand text-white font-black p-4 rounded-xl shadow-lg">Criar Acesso</button>
                </div>
                <div className="bg-white rounded-2xl border divide-y shadow-sm">
                    {equipe.map(e => (
                        <div key={e.id} className="p-5 flex justify-between items-center active:bg-gray-50">
                            <div>
                                <p className="font-bold text-sm text-slate-800">{e.avatar} {e.nome}</p>
                                <p className="text-[10px] text-slate-400 uppercase font-black">{e.funcao}</p>
                            </div>
                            <button onClick={async () => { if(confirm('Remover?')) { await supabase.from('equipe').delete().eq('id', e.id); fetchDados(); } }} className="text-red-300 font-bold text-xs">REMOVER</button>
                        </div>
                    ))}
                </div>
            </div>
          </div>
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

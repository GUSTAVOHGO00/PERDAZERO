<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PerdaZero - PRO MultiLojas</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Bloqueia o balanço elástico do iPhone e garante que o app ocupe a tela real */
    html, body { 
      height: 100%; 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background-color: #0f172a;
    }
    body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    
    .bg-brand { background-color: #00A86B; }
    .text-brand { color: #00A86B; }
    .border-brand { border-color: #00A86B; }
    
    /* Scroll suave e escondido */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 120px; /* Espaço para o menu não cobrir o último item */
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="flex justify-center items-center">

  <div id="root" class="w-full h-[100svh] max-w-md bg-white shadow-2xl overflow-hidden flex flex-col relative"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- CONFIGURAÇÃO SUPABASE ---
    const SUPABASE_URL = 'https://svibstwhmygwczobybse.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2aWJzdHdobXlnd2N6b2J5YnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDAyNzAsImV4cCI6MjA5MTE3NjI3MH0.nlOAfAfsz7BHs3LkBIBG5xNxVv2i7-BCGgj7uPR7dSg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function App() {
      const [view, setView] = useState('select_loja'); 
      const [user, setUser] = useState(null); 
      const [currentLoja, setCurrentLoja] = useState(null);
      const [loading, setLoading] = useState(true);
      
      const [lojas, setLojas] = useState([]);
      const [equipe, setEquipe] = useState([]);
      const [produtosLista, setProdutosLista] = useState([]);
      const [historico, setHistorico] = useState([]);
      
      const [dashboardLojaFiltro, setDashboardLojaFiltro] = useState('todas');
      const [flowStep, setFlowStep] = useState(1);
      const [isSaving, setIsSaving] = useState(false);

      const [registro, setRegistro] = useState({ foto_arquivo: null, foto_url_local: null, produto: null, qtd: '', unidade: 'un', motivo: null, responsavel: null, observacao: '', custo_unitario: 0, icone: '📦' });
      const [customProductName, setCustomProductName] = useState('');
      const [showColegasList, setShowColegasList] = useState(false);
      const [userPendingPin, setUserPendingPin] = useState(null);
      const [pinAttempt, setPinAttempt] = useState('');
      const [pinError, setPinError] = useState(false);
      const [fotoModal, setFotoModal] = useState(null);

      const motivosLista = [
        { id: 1, nome: 'Validade', icone: '📅', cor: 'bg-orange-100 text-orange-600' },
        { id: 2, nome: 'Estragado', icone: '🦠', cor: 'bg-purple-100 text-purple-600' },
        { id: 3, nome: 'Preparo', icone: '🔥', cor: 'bg-red-100 text-red-600' },
        { id: 4, nome: 'Devolução', icone: '😞', cor: 'bg-blue-100 text-blue-600' },
        { id: 5, nome: 'Queda', icone: '👇', cor: 'bg-yellow-100 text-yellow-600' },
        { id: 6, nome: 'Outro', icone: '➕', cor: 'bg-gray-100 text-gray-600' }
      ];

      useEffect(() => { fetchDados(); }, []);

      async function fetchDados() {
          setLoading(true);
          const { data: dl } = await supabase.from('lojas').select('*').order('nome');
          const { data: de } = await supabase.from('equipe').select('*').order('nome');
          const { data: dp } = await supabase.from('produtos').select('*').order('nome');
          const { data: dh } = await supabase.from('historico').select('*').order('id', { ascending: false });
          if(dl) setLojas(dl); if(de) setEquipe(de); if(dp) setProdutosLista(dp); if(dh) setHistorico(dh);
          setLoading(false);
      }

      const handleSelectUser = (u) => {
          if (u.funcao === 'operacional') { setUser(u); setView('home_func'); }
          else { setUserPendingPin(u); setPinAttempt(''); setPinError(false); setView('pin_modal'); }
      };

      const handlePinSubmit = () => {
          if (pinAttempt === userPendingPin.codigo) { 
              setUser(userPendingPin); 
              setView(userPendingPin.funcao === 'admin' ? 'dashboard' : 'home_func');
          } else { setPinError(true); setPinAttempt(''); }
      };

      const formatarMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

      const chartBarRef = useRef(null);
      const chartBarInstance = useRef(null);

      useEffect(() => {
        if (view === 'dashboard' && !loading && chartBarRef.current) {
            if (chartBarInstance.current) chartBarInstance.current.destroy();
            const dados = historico.filter(h => dashboardLojaFiltro === 'todas' || h.loja_id === parseInt(dashboardLojaFiltro));
            const labels = [...new Set(dados.map(d => d.prod))];
            const valores = labels.map(p => dados.filter(x => x.prod === p).reduce((a,b) => a + Number(b.qtd), 0));
            chartBarInstance.current = new Chart(chartBarRef.current.getContext('2d'), {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Volume', data: valores, backgroundColor: '#00A86B', borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
      }, [view, loading, dashboardLojaFiltro, historico]);

      const BottomNav = () => (
          <div className="bg-white border-t p-2 pb-8 flex justify-around items-center absolute bottom-0 w-full z-20 shadow-2xl">
              <button onClick={() => setView('dashboard')} className={`flex flex-col items-center flex-1 ${view==='dashboard'?'text-brand':'text-slate-300'}`}><span className="text-xl">📊</span><span className="text-[10px] font-black uppercase mt-1">Painel</span></button>
              <button onClick={() => setView('manager_produtos')} className={`flex flex-col items-center flex-1 ${view==='manager_produtos'?'text-brand':'text-slate-300'}`}><span className="text-xl">📦</span><span className="text-[10px] font-black uppercase mt-1">Produtos</span></button>
              <button onClick={() => setView('manager_lojas')} className={`flex flex-col items-center flex-1 ${view==='manager_lojas'?'text-brand':'text-slate-300'}`}><span className="text-xl">🏪</span><span className="text-[10px] font-black uppercase mt-1">Lojas</span></button>
              <button onClick={() => setView('manager_equipe')} className={`flex flex-col items-center flex-1 ${view==='manager_equipe'?'text-brand':'text-slate-300'}`}><span className="text-xl">👥</span><span className="text-[10px] font-black uppercase mt-1">Equipe</span></button>
          </div>
      );

      if (loading) return <div className="flex-1 flex items-center justify-center bg-slate-900 text-white font-black text-xl">ROY'S LOADING...</div>;

      // --- VISÃO: SELEÇÃO DE LOJA ---
      if (view === 'select_loja') {
          return (
              <div className="flex-1 flex flex-col p-6 bg-slate-900 justify-center animate-fade-in">
                  <h1 className="text-4xl font-black text-white text-center mb-10 tracking-tighter">Perda<span className="text-brand">Zero</span></h1>
                  <div className="space-y-3">
                      {lojas.map(l => (
                          <button key={l.id} onClick={() => { setCurrentLoja(l); setView('select_user'); }} className="w-full bg-slate-800 border-2 border-slate-700 text-white p-6 rounded-[30px] font-black text-xl flex justify-between items-center active:scale-95 transition-transform">
                              {l.nome} 🏪
                          </button>
                      ))}
                      <button onClick={() => { 
                          const admin = equipe.find(e => e.funcao === 'admin');
                          if(admin) handleSelectUser(admin); else alert('Cadastre o Admin no banco!');
                      }} className="w-full mt-6 border-2 border-dashed border-slate-600 text-slate-500 p-4 rounded-[30px] font-black uppercase tracking-widest text-xs">Administração 🔐</button>
                  </div>
              </div>
          );
      }

      // --- VISÃO: PIN MODAL ---
      if (view === 'pin_modal') {
          return (
              <div className="flex-1 flex flex-col p-4 bg-slate-900 justify-center items-center">
                  <div className="bg-white w-full rounded-[40px] p-6 flex flex-col items-center shadow-2xl relative">
                      <div className="text-5xl mb-2">{userPendingPin.avatar}</div>
                      <h2 className="text-2xl font-black text-slate-800 mb-1">{userPendingPin.nome.split(' ')[0]}</h2>
                      <p className="text-slate-400 font-bold mb-6 text-sm">Digite seu PIN de 4 dígitos</p>
                      <div className="flex space-x-3 mb-6">
                        {[0, 1, 2, 3].map((i) => (<div key={i} className={`w-12 h-12 rounded-2xl flex items-center justify-center text-3xl font-black border-4 ${pinAttempt[i] ? 'border-brand text-brand bg-green-50' : 'border-slate-100 text-transparent bg-gray-50'}`}>{pinAttempt[i] || '•'}</div>))}
                      </div>
                      <div className="grid grid-cols-3 gap-3 w-full">
                          {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (<button key={num} onClick={() => setPinAttempt(pinAttempt + num)} disabled={pinAttempt.length >= 4} className="bg-gray-100 text-slate-800 text-2xl font-black py-4 rounded-2xl active:bg-slate-200">{num}</button>))}
                          <button onClick={() => setView('select_user')} className="text-slate-300 font-black text-xs">SAIR</button>
                          <button onClick={() => setPinAttempt(pinAttempt + '0')} disabled={pinAttempt.length >= 4} className="bg-gray-100 text-slate-800 text-2xl font-black py-4 rounded-2xl active:bg-slate-200">0</button>
                          <button onClick={() => setPinAttempt(pinAttempt.slice(0, -1))} className="bg-red-50 text-red-500 py-4 rounded-2xl flex items-center justify-center text-xl font-black">←</button>
                      </div>
                      <button onClick={handlePinSubmit} disabled={pinAttempt.length !== 4} className={`w-full py-5 mt-6 rounded-[25px] font-black text-xl text-white ${pinAttempt.length === 4 ? 'bg-brand shadow-xl' : 'bg-slate-200'}`}>CONFIRMAR</button>
                  </div>
              </div>
          );
      }

      // --- VISÃO: DASHBOARD ADMIN ---
      if (view === 'dashboard') {
          const dados = historico.filter(h => dashboardLojaFiltro === 'todas' || h.loja_id === parseInt(dashboardLojaFiltro));
          const totalPreju = dados.reduce((a,b)=>a+Number(b.custo_total),0);
          return (
              <div className="flex-1 flex flex-col bg-gray-100 h-full relative overflow-hidden">
                  <div className="bg-slate-900 text-white p-6 pt-10 pb-8 rounded-b-[40px] shadow-2xl shrink-0">
                      <div className="flex justify-between items-center mb-6">
                          <h2 className="text-2xl font-black tracking-tighter">Painel Admin</h2>
                          <button onClick={()=>setView('select_loja')} className="p-3 bg-slate-800 rounded-full text-xl active:scale-90">🚪</button>
                      </div>
                      <select value={dashboardLojaFiltro} onChange={(e)=>setDashboardLojaFiltro(e.target.value)} className="w-full bg-slate-800 p-4 rounded-2xl text-[10px] font-black mb-6 border border-slate-700 uppercase outline-none text-brand">
                          <option value="todas">🌐 VISÃO GLOBAL</option>
                          {lojas.map(l => <option key={l.id} value={l.id}>🏪 {l.nome.toUpperCase()}</option>)}
                      </select>
                      <div className="grid grid-cols-2 gap-4">
                          <div className="bg-slate-800 p-5 rounded-[25px] border-l-8 border-brand">
                              <p className="text-slate-500 text-[9px] font-black uppercase mb-1">Prejuízo R$</p>
                              <p className="text-2xl font-black">{formatarMoeda(totalPreju)}</p>
                          </div>
                          <div className="bg-slate-800 p-5 rounded-[25px] border-l-8 border-red-500">
                              <p className="text-slate-500 text-[9px] font-black uppercase mb-1">Itens</p>
                              <p className="text-2xl font-black">{dados.length}</p>
                          </div>
                      </div>
                  </div>
                  <div className="scroll-container p-4 space-y-6">
                      <div className="bg-white p-6 rounded-[35px] shadow-sm border h-48">
                          <canvas ref={chartBarRef}></canvas>
                      </div>
                      <div className="bg-white rounded-[35px] shadow-xl border overflow-hidden">
                          <div className="p-5 border-b bg-gray-50 font-black text-[10px] text-slate-400 uppercase tracking-widest text-center">Auditoria de Desperdícios</div>
                          <div className="divide-y">
                              {dados.map(h => (
                                  <div key={h.id} className="p-5 flex gap-4 items-center">
                                      <div className="flex-1">
                                          <p className="font-black text-slate-800 text-sm tracking-tight">{h.img} {h.prod} ({h.qtd}{h.uni})</p>
                                          <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">Causa: {h.responsavel}</p>
                                      </div>
                                      <div className="text-right">
                                          <p className="font-black text-red-500 text-sm">{formatarMoeda(h.custo_total)}</p>
                                          <p className="text-[9px] text-slate-300 font-black uppercase">{h.hora}</p>
                                      </div>
                                  </div>
                              ))}
                          </div>
                      </div>
                  </div>
                  <BottomNav />
              </div>
          );
      }

      // --- VISÃO: GESTÃO DE PRODUTOS ---
      if (view === 'manager_produtos') {
        return (
          <div className="flex-1 flex flex-col bg-gray-100 h-full relative overflow-hidden">
            <div className="bg-slate-900 text-white p-6 pt-10 pb-8 rounded-b-[40px] shadow-lg flex justify-between items-center shrink-0">
                <h2 className="text-2xl font-black uppercase">Produtos</h2>
                <button onClick={()=>setView('dashboard')} className="bg-brand px-5 py-2 rounded-full font-black text-[10px]">OK</button>
            </div>
            <div className="scroll-container p-4 space-y-4">
                <div className="bg-white p-6 rounded-[35px] shadow-md border-2 border-brand/10">
                    <div className="flex gap-2 mb-4">
                        <input id="inIcon" placeholder="🎨" className="w-16 p-4 bg-gray-50 rounded-2xl font-black text-center text-xl border-2 border-transparent focus:border-brand" />
                        <input id="inProd" placeholder="NOME DO ITEM" className="flex-1 p-4 bg-gray-50 rounded-2xl font-black uppercase text-sm border-2 border-transparent focus:border-brand outline-none" />
                    </div>
                    <input id="inCusto" type="number" placeholder="CUSTO R$" className="w-full p-4 bg-gray-50 rounded-2xl font-black mb-4 outline-none border-2 border-transparent focus:border-brand" />
                    <button onClick={async()=>{
                        const n=document.getElementById('inProd').value; const i=document.getElementById('inIcon').value; const c=document.getElementById('inCusto').value;
                        if(!n)return; await supabase.from('produtos').insert([{nome:n, icone:i||'📦', custo:c||0}]); fetchDados();
                        document.getElementById('inProd').value=''; document.getElementById('inIcon').value=''; document.getElementById('inCusto').value='';
                    }} className="w-full bg-slate-900 text-white p-5 rounded-[25px] font-black text-lg shadow-xl">SALVAR ITEM</button>
                </div>
                <div className="grid grid-cols-2 gap-3 pb-24">
                    {produtosLista.map(p => (
                        <div key={p.id} className="bg-white p-6 rounded-[35px] shadow-sm relative flex flex-col items-center border">
                            <span className="text-4xl mb-2">{p.icone}</span>
                            <span className="font-black text-slate-800 text-center text-[10px] uppercase leading-tight">{p.nome}</span>
                            <span className="text-brand font-black text-xs mt-1">{formatarMoeda(p.custo)}</span>
                            <button onClick={async()=>{if(confirm('Apagar?')){await supabase.from('produtos').delete().eq('id', p.id); fetchDados();}}} className="absolute top-2 right-4 text-red-200 font-black text-2xl p-2">×</button>
                        </div>
                    ))}
                </div>
            </div>
            <BottomNav />
          </div>
        );
      }

      // Fallback para outras telas de gestão seguindo a mesma lógica...
      return (
          <div className="flex-1 flex flex-col bg-gray-100 h-full relative">
              <div className="bg-slate-900 text-white p-10 pt-14 pb-12 rounded-b-[50px] flex justify-between items-center">
                  <h2 className="text-2xl font-black uppercase">Em Breve</h2>
                  <button onClick={()=>setView('dashboard')} className="bg-brand px-6 py-2 rounded-full font-black text-xs">VOLTAR</button>
              </div>
              <p className="p-20 text-center font-bold text-slate-400">Walney, esta tela está sendo otimizada. Use o menu de Produtos como base!</p>
              <BottomNav />
          </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
